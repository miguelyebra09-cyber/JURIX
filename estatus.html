<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Fila Virtual de Control</title>
    <style>
        :root {
            --naranja-principal: #FF6600;
            --azul-institucional: #006699;
            --gris-texto: #333333;
            --gris-fondo: #F4F6F7;
            --blanco: #FFFFFF;
            --borde-tarjeta: #EAECEE;
            --azul-badge-bg: #E8F4F8;
            --azul-badge-txt: #006699;
            --sombra: 0 4px 12px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            padding: 0;
            color: var(--gris-texto);
        }

        header {
            background-color: var(--blanco);
            padding: 22px;
            text-align: center;
            border-bottom: 4px solid var(--naranja-principal);
        }

        header h1 {
            color: var(--naranja-principal);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        nav {
            background-color: #1F3A52;
            padding: 14px;
            text-align: center;
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--naranja-principal);
        }

        .container {
            max-width: 1150px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* --- CUADRO DE PERFIL ORIGINAL --- */
        .profile-bar {
            background: var(--blanco);
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-left: 5px solid var(--azul-institucional);
        }

        .user-meta p {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .user-meta strong {
            color: #111;
        }

        .role-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .badge-supervisor { background: #FEF9E7; color: #B7950B; }
        .badge-usuario { background: #EBF5FB; color: #2980B9; }

        /* --- CONSOLA DE BÚSQUEDA --- */
        .search-console {
            background: var(--blanco);
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            margin-bottom: 30px;
            border: 1px solid var(--borde-tarjeta);
        }

        .search-console h3 {
            margin-top: 0;
            color: var(--azul-institucional);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .search-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #566573;
        }

        .search-group input, .search-group select {
            width: 100%;
            padding: 11px;
            border: 1px solid #CCC;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
            outline: none;
        }

        .search-group input:focus, .search-group select:focus {
            border-color: var(--naranja-principal);
        }

        /* --- DISEÑO V VISUAL SOLICITADO --- */
        .panel-control-turno {
            background: var(--blanco);
            border-radius: 8px;
            border: 1px solid #D5DBDB;
            box-shadow: var(--sombra);
            padding: 25px;
            margin-bottom: 25px;
        }

        .panel-titulo-seccion {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1C2833;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-interno-turno {
            border-left: 5px solid var(--azul-institucional);
            background-color: #F8FAFB;
            border-top: 1px solid #E5E8E8;
            border-right: 1px solid #E5E8E8;
            border-bottom: 1px solid #E5E8E8;
            border-radius: 4px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.8fr;
            gap: 20px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .card-interno-turno { grid-template-columns: 1fr; }
        }

        .columna-datos p {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #2C3E50;
        }

        .columna-datos strong {
            color: #000;
            font-weight: 600;
        }

        .columna-badge-derecha {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .badge-dictamen {
            background-color: var(--azul-badge-bg);
            color: var(--azul-badge-txt);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .estimado-tiempo {
            border: 1px dashed #BDC3C7;
            background: var(--blanco);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #555;
        }

        #contenedor-tickets-maestro {
            min-height: 150px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="txt-dinamico-titulo">JURIX-DGAJ - Fila Virtual de Control</h1>
    </header>

    <nav>
        <a href="solicitud.html">Nueva Solicitud</a>
        <a href="hallazgo.html">Cédula de Hallazgos</a>
        <a href="estatus.html">Estatus / Fila Virtual</a>
        <a href="salir">Salir del Sistema</a>
    </nav>

    <div class="container">
        
        <div class="profile-bar">
            <div class="user-meta">
                <p>Bienvenido(a): <strong id="lbl-nombre-sesion">Artuto Vidal Rojas</strong></p>
                <p>Área: <strong id="lbl-area-sesion">Auditoría Especial de Cumplimiento Financiero</strong></p>
            </div>
            <div>
                <span id="badge-rol-contenedor" class="role-badge badge-usuario">PERFIL: USUARIO</span>
            </div>
        </div>

        <div class="search-console">
            <h3>🔍 Consola de Inteligencia y Filtros de Búsqueda</h3>
            <div class="search-grid">
                <div class="search-group">
                    <label>Filtrar por Ticket ID (Folio):</label>
                    <input type="text" id="txt-buscar-folio" placeholder="Ej: JURIX-DGAJ-DCPL...">
                </div>
                <div class="search-group">
                    <label>Filtrar por Auditor / Solicitante:</label>
                    <input type="text" id="txt-buscar-usuario" placeholder="Ej: Artuto Vidal">
                </div>
                <div class="search-group">
                    <label>Filtrar por Ente Fiscalizado:</label>
                    <input type="text" id="txt-buscar-sujeto" placeholder="Ej: FGEG, MCUE, MGTO...">
                </div>
                <div class="search-group">
                    <label>Filtrar por Puesto:</label>
                    <select id="select-buscar-puesto">
                        <option value="">-- Todos los Puestos --</option>
                        <option value="Directora DCPL">Directora DCPL</option>
                        <option value="Auditor">Auditor</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="contenedor-tickets-maestro"></div>

    </div>

    <script>
        // CONFIGURACIÓN DE CONEXIÓN CON TU TABLA DE SUPABASE "hallazgos"
        const URL_HALLAZGOS = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/hallazgos";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let nombreSesionReal = "";
        let areaSesionReal = "";
        let esSupervisor = false;

        window.addEventListener('DOMContentLoaded', () => {
            // EXTRACCIÓN AUTOMÁTICA DIRECTO DESDE LA PANTALLA (Sin depender de variables estáticas externas)
            const elementoNombre = document.getElementById('lbl-nombre-sesion');
            const elementoArea = document.getElementById('lbl-area-sesion');
            const badgeRol = document.getElementById('badge-rol-contenedor');

            nombreSesionReal = elementoNombre ? elementoNombre.innerText.trim() : "Artuto Vidal Rojas";
            areaSesionReal = elementoArea ? elementoArea.innerText.trim() : "Auditoría Especial de Cumplimiento Financiero";

            // Validación dinámica de roles e intercambio visual automático de Badges
            if (nombreSesionReal.toLowerCase().includes("juan miguel") || areaSesionReal.toLowerCase().includes("dgaj")) {
                esSupervisor = true;
                badgeRol.innerText = "PERFIL: SUPERVISOR";
                badgeRol.className = "role-badge badge-supervisor";
            } else {
                esSupervisor = false;
                badgeRol.innerText = "PERFIL: USUARIO";
                badgeRol.className = "role-badge badge-usuario";
            }

            // Llamar a la base de datos real utilizando tu tabla "hallazgos"
            conectarTablaSupabaseHallazgos();

            // Enlazar los inputs de la consola al motor de filtros interactivos
            document.getElementById('txt-buscar-folio').addEventListener('input', ejecutarFiltrosCampos);
            document.getElementById('txt-buscar-usuario').addEventListener('input', ejecutarFiltrosCampos);
            document.getElementById('txt-buscar-sujeto').addEventListener('input', ejecutarFiltrosCampos);
            document.getElementById('select-buscar-puesto').addEventListener('change', ejecutarFiltrosCampos);
        });

        // DESCARGA DE INFORMACIÓN CON LAS COLUMNAS REALES DE TU TABLA (IMAGEN 1)
        async function conectarTablaSupabaseHallazgos() {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "<p style='text-align:center; color:#7F8C8D;'>Sincronizando con la tabla hallazgos de Supabase...</p>";

            try {
                // Hacemos el fetch pidiendo los datos ordenados por folio
                const response = await fetch(`${URL_HALLAZGOS}?select=*&order=folio_user.asc`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("Fallo de conexión");
                const datosProcesados = await response.json();

                // MOCK DE CONTINGENCIA EXACTO si la tabla está vacía temporalmente en pruebas locales
                let listaFinal = datosProcesados;
                if (!listaFinal || listaFinal.length === 0) {
                    listaFinal = [
                        {
                            folio_user: "JURIX-DGAJ-DCPL-B003-0001",
                            sujeto_fiscalizado: "MCUE",
                            usuario_nombre: "Juan Miguel Yebra Prieto",
                            puesto_usuario: "Directora DCPL",
                            area_usuario: "Dirección General de Asuntos Jurídicos",
                            tipo_solicitud: "Análisis de Informe"
                        },
                        {
                            folio_user: "JURIX-DGAJ-DCPL-B003-0002",
                            sujeto_fiscalizado: "FGEG",
                            usuario_nombre: "Artuto Vidal Rojas",
                            puesto_usuario: "Auditor",
                            area_usuario: "Auditoría Especial de Cumplimiento Financiero",
                            tipo_solicitud: "Revisión de Hallazgos"
                        }
                    ];
                }

                // Renderizamos en base a las reglas de negocio
                renderizarContenedoresEstiloTurno(listaFinal);

            } catch (error) {
                console.error("Error al mapear Supabase: ", error);
                contenedor.innerHTML = "<p style='color:red; text-align:center;'>⚠️ Error de enlace con la tabla 'hallazgos'. Revisa los privilegios RLS de Supabase.</p>";
            }
        }

        // CONSTRUCCIÓN VISUAL ATRACTIVA - CLON DE LA IMAGEN 2
        function renderizarContenedoresEstiloTurno(tickets) {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "";

            // Regla de Perfiles: Si es Usuario normal, solo ve lo suyo. Si es Supervisor, ve todo.
            const ticketsFiltradosPorPerfil = tickets.filter(t => {
                if (esSupervisor) return true; // Supervisor ve todo lo de la base de datos
                
                // Usuario común: Comparamos si el registro de la DB coincide con el nombre en pantalla
                const solicitanteDB = (t.usuario_nombre || "").toLowerCase().trim();
                const sesionActual = nombreSesionReal.toLowerCase().trim();
                return solicitanteDB === sesionActual || solicitanteDB === "" || solicitanteDB === "null" || solicitanteDB.includes("invitado");
            });

            if (ticketsFiltradosPorPerfil.length === 0) {
                contenedor.innerHTML = "<p style='text-align:center; color:#95A5A6; background:#fff; padding:35px; border-radius:8px; border: 1px dashed #ccc;'>No se encontraron tickets registrados o autorizados para este perfil.</p>";
                return;
            }

            ticketsFiltradosPorPerfil.forEach(ticket => {
                // MAPEO DIRECTO CON LAS COLUMNAS ASIGNADAS EN TU IMAGEN 1 DE SUPABASE
                const folioUser = ticket.folio_user || "JURIX-DGAJ-DCPL-B003-0001";
                const sujeto = ticket.sujeto_fiscalizado || "ENTE";
                const usuario = ticket.usuario_nombre || "Usuario no asignado";
                const puesto = ticket.puesto_usuario || "Puesto Regular";
                const area = ticket.area_usuario || "Dirección Solicitante";
                const solicitud = ticket.tipo_solicitud || "Análisis de Informe";
                
                // Lógica de badges visuales e indicación de tiempos dinámicos
                let badgeDictamen = "DICTAMEN B003";
                let tiemposEstimados = "Est. 1 a 2 días hábiles";

                if(sujeto === "FGEG" || sujeto === "MDHI") {
                    badgeDictamen = "DICTAMEN B001";
                    tiemposEstimados = "Est. 3 a 5 días hábiles";
                }

                const divTarjeta = document.createElement('div');
                divTarjeta.className = "panel-control-turno";
                
                // Meta tags de búsqueda para la consola reactiva
                divTarjeta.setAttribute('data-folio', folioUser.toLowerCase());
                divTarjeta.setAttribute('data-usuario', usuario.toLowerCase());
                divTarjeta.setAttribute('data-sujeto', sujeto.toLowerCase());
                divTarjeta.setAttribute('data-puesto', puesto.toLowerCase());

                // Estructura HTML idéntica a tu captura 2
                divTarjeta.innerHTML = `
                    <div class="panel-titulo-seccion">⏳ Control Virtual de Turno e Información de Fila</div>
                    <div class="card-interno-turno">
                        
                        <div class="columna-datos">
                            <p><strong>Ticket ID:</strong> ${folioUser}</p>
                            <p><strong>Solicitud:</strong> ${solicitud}</p>
                            <p><strong>Usuario:</strong> ${usuario}</p>
                        </div>

                        <div class="columna-datos">
                            <p><strong>Puesto:</strong> ${puesto}</p>
                            <p><strong>Área:</strong> ${area}</p>
                            <p><strong>Posición Fila:</strong> <span style="color:#27AE60; font-weight:700;">Turno Virtual Activo (${sujeto})</span></p>
                        </div>

                        <div class="columna-badge-derecha">
                            <div class="badge-dictamen">${badgeDictamen}</div>
                            <div class="estimado-tiempo">
                                ⏱️ ${tiemposEstimados}
                            </div>
                        </div>

                    </div>
                `;
                contenedor.appendChild(divTarjeta);
            });
        }

        // MOTOR ASÍNCRONO DE BÚSQUEDA CRUZADA POR CAMPOS INDEPENDIENTES
        function ejecutarFiltrosCampos() {
            const filtroFolio = document.getElementById('txt-buscar-folio').value.toLowerCase().trim();
            const filtroUsuario = document.getElementById('txt-buscar-usuario').value.toLowerCase().trim();
            const filtroSujeto = document.getElementById('txt-buscar-sujeto').value.toLowerCase().trim();
            const filtroPuesto = document.getElementById('select-buscar-puesto').value.toLowerCase();

            const todasLasTarjetas = document.querySelectorAll('.panel-control-turno');

            todasLasTarjetas.forEach(tarjeta => {
                const cumpleFolio = tarjeta.getAttribute('data-folio').includes(filtroFolio);
                const cumpleUsuario = tarjeta.getAttribute('data-usuario').includes(filtroUsuario);
                const cumpleSujeto = tarjeta.getAttribute('data-sujeto').includes(filtroSujeto);
                const cumplePuesto = filtroPuesto === "" || tarjeta.getAttribute('data-puesto').includes(filtroPuesto);

                // Si cumple de forma simultánea con los campos rellenados, se muestra
                if (cumpleFolio && cumpleUsuario && cumpleSujeto && cumplePuesto) {
                    tarjeta.style.display = "block";
                } else {
                    tarjeta.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
