<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Fila Virtual de Control</title>
    <style>
        :root {
            --naranja-principal: #FF6600;
            --azul-institucional: #006699;
            --gris-texto: #333333;
            --gris-fondo: #F4F6F7;
            --blanco: #FFFFFF;
            --borde-tarjeta: #EAECEE;
            --azul-badge-bg: #E8F4F8;
            --azul-badge-txt: #006699;
            --sombra: 0 4px 12px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            padding: 0;
            color: var(--gris-texto);
        }

        header {
            background-color: var(--blanco);
            padding: 22px;
            text-align: center;
            border-bottom: 4px solid var(--naranja-principal);
        }

        header h1 {
            color: var(--naranja-principal);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        nav {
            background-color: #1F3A52;
            padding: 14px;
            text-align: center;
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--naranja-principal);
        }

        .container {
            max-width: 1150px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* --- CUADRO DE PERFIL DINÁMICO --- */
        .profile-bar {
            background: var(--blanco);
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-left: 5px solid var(--azul-institucional);
        }

        .user-meta p {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .user-meta strong {
            color: #111;
        }

        .role-badge {
            padding: 8px 16px;
            border-radius: 20 Fort;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .badge-supervisor { background: #FEF9E7; color: #B7950B; }
        .badge-usuario { background: #EBF5FB; color: #2980B9; }

        /* --- CONSOLA DE BÚSQUEDA --- */
        .search-console {
            background: var(--blanco);
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            margin-bottom: 30px;
            border: 1px solid var(--borde-tarjeta);
        }

        .search-console h3 {
            margin-top: 0;
            color: var(--azul-institucional);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .search-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #566573;
        }

        .search-group input, .search-group select {
            width: 100%;
            padding: 11px;
            border: 1px solid #CCC;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
            outline: none;
        }

        /* --- CONTENEDOR VISUAL DE TURNOS (ESTILO FILA VIRTUAL) --- */
        .panel-control-turno {
            background: var(--blanco);
            border-radius: 8px;
            border: 1px solid #D5DBDB;
            box-shadow: var(--sombra);
            padding: 25px;
            margin-bottom: 25px;
        }

        .panel-titulo-seccion {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1C2833;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-interno-turno {
            border-left: 5px solid var(--naranja-principal);
            background-color: #F8FAFB;
            border-top: 1px solid #E5E8E8;
            border-right: 1px solid #E5E8E8;
            border-bottom: 1px solid #E5E8E8;
            border-radius: 4px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.1fr 1.1fr 0.8fr;
            gap: 20px;
            align-items: flex-start;
        }

        @media (max-width: 850px) {
            .card-interno-turno { grid-template-columns: 1fr; }
        }

        .columna-datos p {
            margin: 6px 0;
            font-size: 0.9rem;
            color: #2C3E50;
            line-height: 1.4;
        }

        .columna-datos strong {
            color: #1F3A52;
            font-weight: 600;
        }

        .columna-badge-derecha {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .badge-dictamen {
            background-color: var(--azul-badge-bg);
            color: var(--azul-badge-txt);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .estimado-tiempo {
            border: 1px dashed #BDC3C7;
            background: var(--blanco);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #555;
        }

        .comentarios-box {
            grid-column: 1 / -1;
            background: #FFFEEA;
            border: 1px solid #F39C12;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 5px;
            color: #7E5109;
        }

        /* --- PREPARACIÓN DE LÍNEA DE TIEMPO --- */
        .timeline-container {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #EAEDED;
            display: flex;
            justify-content: space-between;
            position: relative;
        }

        .timeline-line {
            position: absolute;
            top: 24px;
            left: 5%;
            right: 5%;
            height: 4px;
            background-color: #D5DBDB;
            z-index: 1;
        }

        .timeline-step {
            text-align: center;
            position: relative;
            z-index: 2;
            width: 20%;
        }

        .timeline-dot {
            width: 18px;
            height: 18px;
            background-color: #BDC3C7;
            border-radius: 50%;
            margin: 0 auto 8px auto;
            border: 3px solid var(--blanco);
            box-shadow: 0 0 0 2px #BDC3C7;
        }

        .timeline-step.active .timeline-dot {
            background-color: var(--naranja-principal);
            box-shadow: 0 0 0 2px var(--naranja-principal);
        }

        .timeline-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: #7F8C8D;
        }

        .timeline-step.active .timeline-text {
            color: var(--naranja-principal);
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ - Fila Virtual de Control</h1>
    </header>

    <nav>
        <a href="solicitud.html">Nueva Solicitud</a>
        <a href="hallazgo.html">Cédula de Hallazgos</a>
        <a href="estatus.html">Estatus / Fila Virtual</a>
        <a href="salir">Salir del Sistema</a>
    </nav>

    <div class="container">
        
        <div class="profile-bar">
            <div class="user-meta">
                <p>Usuario Activo: <strong id="lbl-nombre-sesion">Identificando...</strong></p>
                <p>Área de Control: <strong id="lbl-area-sesion">Cargando...</strong></p>
            </div>
            <div>
                <span id="badge-rol-contenedor" class="role-badge">VERIFICANDO...</span>
            </div>
        </div>

        <div class="search-console">
            <h3>🔍 Consola de Inteligencia y Filtros de Búsqueda</h3>
            <div class="search-grid">
                <div class="search-group">
                    <label>Filtrar por Ticket ID (Folio):</label>
                    <input type="text" id="txt-buscar-folio" placeholder="Ej: JURIX-DGAJ-DCPL...">
                </div>
                <div class="search-group">
                    <label>Filtrar por Auditor / Solicitante:</label>
                    <input type="text" id="txt-buscar-usuario" placeholder="Ej: Artuto Vidal">
                </div>
                <div class="search-group">
                    <label>Filtrar por Ente Fiscalizado:</label>
                    <input type="text" id="txt-buscar-sujeto" placeholder="Ej: FGEG, MCUE, MGTO...">
                </div>
                <div class="search-group">
                    <label>Filtrar por Puesto:</label>
                    <select id="select-buscar-puesto">
                        <option value="">-- Todos los Puestos --</option>
                        <option value="Directora DCPL">Directora DCPL</option>
                        <option value="Auditor">Auditor</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="contenedor-tickets-maestro"></div>

    </div>

    <script>
        const URL_SOLICITUDES = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitudes";
        const URL_HALLAZGOS = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/hallazgos";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let nombreSesionReal = "";
        let areaSesionReal = "";
        let esSupervisor = false;

        window.addEventListener('DOMContentLoaded', () => {
            nombreSesionReal = localStorage.getItem('jurix_nombre_usuario') || localStorage.getItem('last_user_name') || "Juan Miguel Yebra Prieto";
            areaSesionReal = localStorage.getItem('jurix_area_usuario') || localStorage.getItem('last_user_area') || "Dirección General de Asuntos Jurídicos";

            document.getElementById('lbl-nombre-sesion').innerText = nombreSesionReal;
            document.getElementById('lbl-area-sesion').innerText = areaSesionReal;

            const badgeRol = document.getElementById('badge-rol-contenedor');
            const nNombre = nombreSesionReal.toLowerCase();

            if (nNombre.includes("juan miguel") || nNombre.includes("yebra") || areaSesionReal.toLowerCase().includes("dgaj")) {
                esSupervisor = true;
                badgeRol.innerText = "PERFIL: SUPERVISOR";
                badgeRol.className = "role-badge badge-supervisor";
            } else {
                esSupervisor = false;
                badgeRol.innerText = "PERFIL: USUARIO";
                badgeRol.className = "role-badge badge-usuario";
            }

            // Descargar y unificar los datos de ambas tablas
            descargarYUnificarTablas();

            // Eventos de Filtros
            document.getElementById('txt-buscar-folio').addEventListener('input', ejecutarFiltrosCampos);
            document.getElementById('txt-buscar-usuario').addEventListener('input', ejecutarFiltrosCampos);
            document.getElementById('txt-buscar-sujeto').addEventListener('input', ejecutarFiltrosCampos);
            document.getElementById('select-buscar-puesto').addEventListener('change', ejecutarFiltrosCampos);
        });

        async function descargarYUnificarTablas() {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "<p style='text-align:center; color:#7F8C8D;'>Sincronizando información multi-tabla de Fila Virtual...</p>";

            try {
                // 1. Descarga paralela de ambas tablas
                const [resSolicitudes, resHallazgos] = await Promise.all([
                    fetch(`${URL_SOLICITUDES}?select=*`, { method: 'GET', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
                    fetch(`${URL_HALLAZGOS}?select=*`, { method: 'GET', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } })
                ]);

                let solicitudesData = resSolicitudes.ok ? await resSolicitudes.json() : [];
                let hallazgosData = resHallazgos.ok ? await resHallazgos.json() : [];

                // MOCKS DE RESPALDO (Por si las tablas de Supabase están vacías)
                if (solicitudesData.length === 0) {
                    solicitudesData = [
                        { folio_ticket: "JURIX-DGAJ-DCPL-B003-0001", nombre_solicitante: "Juan Miguel Yebra Prieto", puesto_solicitante: "Directora DCPL", servicio: "Análisis Normativo", asunto: "Revisión integral de la Cuenta Pública Estatal" },
                        { folio_ticket: "JURIX-DGAJ-DCPL-B003-0002", nombre_solicitante: "Artuto Vidal Rojas", puesto_solicitante: "Auditor", servicio: "Revisión Financiera", asunto: "Auditoría de Fondos Federales de Seguridad" }
                    ];
                }
                if (hallazgosData.length === 0) {
                    hallazgosData = [
                        { folio_ticket: "JURIX-DGAJ-DCPL-B003-0001", sujeto_fiscalizado: "MCUE", tipo_auditoria: "Financiera", tipo_hallazgo: "Inobservancia", num_concepto: "4", fecha_recepcion: "2026-06-15", comentarios_revision: "Pendiente de solventar por parte de la entidad pública." },
                        { folio_ticket: "JURIX-DGAJ-DCPL-B003-0002", sujeto_fiscalizado: "FGEG", tipo_auditoria: "Cumplimiento", tipo_hallazgo: "Deficiencia", num_concepto: "12", fecha_recepcion: "2026-06-16", comentarios_revision: "Se detectaron inconsistencias en las bitácoras de obra." }
                    ];
                }

                // 2. PROCESO DE CRUCE LÓGICO (JOIN) POR folio_ticket
                let ticketsUnificados = solicitudesData.map(sol => {
                    // Buscar su par correspondiente en hallazgos
                    const hallazgoPar = hallazgosData.find(h => h.folio_ticket === sol.folio_ticket) || {};
                    return {
                        ...sol,
                        ...hallazgoPar
                    };
                });

                renderizarContenedoresEstiloTurno(ticketsUnificados);

            } catch (error) {
                console.error("Error unificando tablas: ", error);
                contenedor.innerHTML = "<p style='color:red; text-align:center;'>⚠️ Error de enlace multi-tabla. Revisa conexiones.</p>";
            }
        }

        function renderizarContenedoresEstiloTurno(tickets) {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "";

            // FILTRADO POR PERFIL DE SEGURIDAD
            const ticketsFiltrados = tickets.filter(t => {
                if (esSupervisor) return true; 
                if (!t.nombre_solicitante) return false;
                return t.nombre_solicitante.toLowerCase().includes(nombreSesionReal.toLowerCase().trim());
            });

            if (ticketsFiltrados.length === 0) {
                contenedor.innerHTML = `<p style='text-align:center; color:#95A5A6; background:#fff; padding:35px; border-radius:8px; border: 1px dashed #ccc;'>No existen tickets vinculados al perfil: ${nombreSesionReal}</p>`;
                return;
            }

            ticketsFiltrados.forEach(ticket => {
                // Extracción segura de Campos de Tabla "Solicitudes"
                const folio = ticket.folio_ticket || "S/F";
                const solicitante = ticket.nombre_solicitante || "No asignado";
                const puesto = ticket.puesto_solicitante || "Auditor";
                const servicio = ticket.servicio || "General";
                const asuntoOriginal = ticket.asunto || "Sin Asunto";
                
                // Limitador estricto del campo Asunto a 20 caracteres
                const asuntoRecortado = asuntoOriginal.length > 20 ? asuntoOriginal.substring(0, 20) + "..." : asuntoOriginal;

                // Extracción segura de Campos de Tabla "Hallazgos"
                const sujeto = ticket.sujeto_fiscalizado || "ENTE";
                const tipoAuditoria = ticket.tipo_auditoria || "N/A";
                const tipoHallazgo = ticket.tipo_hallazgo || "Regular";
                const numConcepto = ticket.num_concepto || "0";
                const fecha = ticket.fecha_recepcion || "2026-06-16";
                const comentarios = ticket.comentarios_revision || "Sin observaciones registradas por el momento.";

                const divTarjeta = document.createElement('div');
                divTarjeta.className = "panel-control-turno";
                
                // Atributos meta para búsquedas instantáneas
                divTarjeta.setAttribute('data-folio', folio.toLowerCase());
                divTarjeta.setAttribute('data-usuario', solicitante.toLowerCase());
                divTarjeta.setAttribute('data-sujeto', sujeto.toLowerCase());
                divTarjeta.setAttribute('data-puesto', puesto.toLowerCase());

                divTarjeta.innerHTML = `
                    <div class="panel-titulo-seccion">⏳ Control Virtual de Turno e Información de Fila</div>
                    <div class="card-interno-turno">
                        
                        <div class="columna-datos">
                            <p><strong>Ticket ID:</strong> ${folio}</p>
                            <p><strong>Solicitante:</strong> ${solicitante}</p>
                            <p><strong>Puesto:</strong> ${puesto}</p>
                            <p><strong>Servicio:</strong> ${servicio}</p>
                            <p><strong>Asunto:</strong> <span title="${asuntoOriginal}">${asuntoRecortado}</span></p>
                        </div>

                        <div class="columna-datos">
                            <p><strong>Ente Fiscalizado:</strong> ${sujeto}</p>
                            <p><strong>Auditoría:</strong> ${tipoAuditoria}</p>
                            <p><strong>Tipo Hallazgo:</strong> ${tipoHallazgo}</p>
                            <p><strong>Núm. Concepto:</strong> ${numConcepto}</p>
                            <p><strong>F. Recepción:</strong> ${fecha}</p>
                        </div>

                        <div class="columna-badge-derecha">
                            <div class="badge-dictamen">${tipoAuditoria} - ${sujeto}</div>
                            <div class="estimado-tiempo">
                                ⏱️ Est. 2 a 4 Días Hábiles
                            </div>
                        </div>

                        <div class="comentarios-box">
                            <strong>Comentarios de Revisión:</strong> ${comentarios}
                        </div>
                    </div>

                    <div class="timeline-container">
                        <div class="timeline-line"></div>
                        <div class="timeline-step active">
                            <div class="timeline-dot"></div>
                            <div class="timeline-text">Enviado</div>
                        </div>
                        <div class="timeline-step active">
                            <div class="timeline-dot"></div>
                            <div class="timeline-text">En Revisión</div>
                        </div>
                        <div class="timeline-step">
                            <div class="timeline-dot"></div>
                            <div class="timeline-text">Validando</div>
                        </div>
                        <div class="timeline-step">
                            <div class="timeline-dot"></div>
                            <div class="timeline-text">Dictaminado</div>
                        </div>
                    </div>
                `;
                contenedor.appendChild(divTarjeta);
            });
        }

        function ejecutarFiltrosCampos() {
            const filtroFolio = document.getElementById('txt-buscar-folio').value.toLowerCase().trim();
            const filtroUsuario = document.getElementById('txt-buscar-usuario').value.toLowerCase().trim();
            const '../../..';
            const filtroSujeto = document.getElementById('txt-buscar-sujeto').value.toLowerCase().trim();
            const filtroPuesto = document.getElementById('select-buscar-puesto').value.toLowerCase();

            const todasLasTarjetas = document.querySelectorAll('.panel-control-turno');

            todasLasTarjetas.forEach(tarjeta => {
                const cumpleFolio = tarjeta.getAttribute('data-folio').includes(filtroFolio);
                const cumpleUsuario = tarjeta.getAttribute('data-usuario').includes(filtroUsuario);
                const cumpleSujeto = tarjeta.getAttribute('data-sujeto').includes(filtroSujeto);
                const cumplePuesto = filtroPuesto === "" || tarjeta.getAttribute('data-puesto').includes(filtroPuesto);

                if (cumpleFolio && cumpleUsuario && cumpleSujeto && cumplePuesto) {
                    tarjeta.style.display = "block";
                } else {
                    tarjeta.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
