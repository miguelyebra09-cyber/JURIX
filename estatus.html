<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Fila Virtual de Control</title>
    <style>
        :root {
            --naranja-principal: #FF6600;
            --azul-institucional: #006699;
            --gris-texto: #333333;
            --gris-fondo: #F4F6F7;
            --blanco: #FFFFFF;
            --borde-tarjeta: #EAECEE;
            --azul-badge-bg: #E8F4F8;
            --azul-badge-txt: #006699;
            --sombra: 0 4px 12px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            padding: 0;
            color: var(--gris-texto);
        }

        /* --- ENCABEZADO PRINCIPAL --- */
        header {
            background-color: var(--blanco);
            padding: 22px;
            text-align: center;
            border-bottom: 4px solid var(--naranja-principal);
        }

        header h1 {
            color: var(--naranja-principal);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        /* --- MENÚ DE NAVEGACIÓN --- */
        nav {
            background-color: #1F3A52;
            padding: 14px;
            text-align: center;
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--naranja-principal);
        }

        .container {
            max-width: 1150px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* --- PANEL DE INFORMACIÓN DE SESIÓN --- */
        .profile-bar {
            background: var(--blanco);
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-left: 5px solid var(--azul-institucional);
        }

        .user-meta p {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .user-meta strong {
            color: #111;
        }

        .role-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            background: #F2F4F4;
            color: #7F8C8D;
        }
        .badge-supervisor { background: #FEF9E7; color: #B7950B; }
        .badge-usuario { background: #EBF5FB; color: #2980B9; }

        /* --- CONSOLA DE BÚSQUEDA POR CAMPOS --- */
        .search-console {
            background: var(--blanco);
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--sombra);
            margin-bottom: 30px;
            border: 1px solid var(--borde-tarjeta);
        }

        .search-console h3 {
            margin-top: 0;
            color: var(--azul-institucional);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .search-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #566573;
        }

        .search-group input, .search-group select {
            width: 100%;
            padding: 11px;
            border: 1px solid #CCC;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-group input:focus, .search-group select:focus {
            border-color: var(--naranja-principal);
            box-shadow: 0 0 5px rgba(255, 102, 0, 0.15);
        }

        /* ==========================================================================
           🎨 CONTENEDOR ESTILO CAPTURA 2 (CONTROL VIRTUAL DE TURNO)
           ========================================================================== */
        .panel-control-turno {
            background: var(--blanco);
            border-radius: 8px;
            border: 1px solid #D5DBDB;
            box-shadow: var(--sombra);
            padding: 25px;
            margin-bottom: 25px;
        }

        .panel-titulo-seccion {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1C2833;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-interno-turno {
            border-left: 5px solid var(--azul-institucional);
            background-color: #F8FAFB;
            border-top: 1px solid #E5E8E8;
            border-right: 1px solid #E5E8E8;
            border-bottom: 1px solid #E5E8E8;
            border-radius: 4px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.8fr;
            gap: 20px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .card-interno-turno {
                grid-template-columns: 1fr;
            }
        }

        .columna-datos p {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #2C3E50;
        }

        .columna-datos strong {
            color: #000;
            font-weight: 600;
        }

        /* Bloque de insignia dinámica derecha */
        .columna-badge-derecha {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .columna-badge-derecha {
                align-items: flex-start;
                text-align: left;
            }
        }

        .badge-dictamen {
            background-color: var(--azul-badge-bg);
            color: var(--azul-badge-txt);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .estimado-tiempo {
            border: 1px dashed #BDC3C7;
            background: var(--blanco);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #contenedor-tickets-maestro {
            min-height: 200px;
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ - Fila Virtual de Control</h1>
    </header>

    <nav>
        <a href="solicitud.html">Nueva Solicitud</a>
        <a href="hallazgo.html">Cédula de Hallazgos</a>
        <a href="estatus.html">Estatus / Fila Virtual</a>
        <a href="index.html">Salir del Sistema</a>
    </nav>

    <div class="container">
        
        <div class="profile-bar">
            <div class="user-meta">
                <p>Usuario: <strong id="lbl-nombre-sesion">Cargando...</strong></p>
                <p>Área: <strong id="lbl-area-sesion">...</strong></p>
            </div>
            <div id="badge-rol-contenedor" class="role-badge">Cargando Perfil...</div>
        </div>

        <div class="search-console">
            <h3>🔍 Consola de Inteligencia y Búsqueda de Tickets</h3>
            <div class="search-grid">
                <div class="search-group">
                    <label>Buscar por Ticket ID / Folio:</label>
                    <input type="text" id="txt-buscar-folio" placeholder="Ej: JURIX-DGAJ-DCPL...">
                </div>
                <div class="search-group">
                    <label>Buscar por Auditor / Usuario:</label>
                    <input type="text" id="txt-buscar-usuario" placeholder="Ej: Juan Miguel">
                </div>
                <div class="search-group">
                    <label>Buscar por Sujeto / Ente Fiscalizado:</label>
                    <input type="text" id="txt-buscar-sujeto" placeholder="Ej: FGEG o MGTO">
                </div>
                <div class="search-group">
                    <label>Filtrar por Puesto u Obligación:</label>
                    <select id="select-buscar-puesto">
                        <option value="">-- Todos los Puestos --</option>
                        <option value="Directora DCPL">Directora DCPL</option>
                        <option value="Auditor">Auditor Especial</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="contenedor-tickets-maestro"></div>

    </div>

    <script>
        // CONFIGURACIÓN DE CONEXIONES API REST
        const URL_SOLICITUDES = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitudes";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let userRole = "usuario";
        let currentUserName = "";

        // AL CARGAR EL TEMPLATE
        window.addEventListener('DOMContentLoaded', () => {
            // Cargar credenciales limpias desde almacenamiento de sesión
            currentUserName = localStorage.getItem('jurix_nombre_usuario') || localStorage.getItem('last_user_name') || "Juan Miguel Yebra Prieto";
            const areaSesion = localStorage.getItem('jurix_area_usuario') || localStorage.getItem('last_user_area') || "Dirección General de Asuntos Jurídicos";
            
            // Render de cabecera de perfil
            document.getElementById('lbl-nombre-sesion').textContent = currentUserName;
            document.getElementById('lbl-area-sesion').textContent = areaSesion;

            // Determinar perfil visual supervisor/usuario
            if(currentUserName.includes("Juan Miguel") || currentUserName.includes("Director")){
                userRole = "supervisor";
                const b = document.getElementById('badge-rol-contenedor');
                b.textContent = "PERFIL: SUPERVISOR";
                b.className = "role-badge badge-supervisor";
            } else {
                userRole = "usuario";
                const b = document.getElementById('badge-rol-contenedor');
                b.textContent = "NIVEL: USUARIO";
                b.className = "role-badge badge-usuario";
            }

            // Inicializar enlace a base de datos
            cargarDatosSupabaseFila();

            // Configurar busqueda en tiempo real (Asincrona reactiva)
            document.getElementById('txt-buscar-folio').addEventListener('input', filtrarCamposConsola);
            document.getElementById('txt-buscar-usuario').addEventListener('input', filtrarCamposConsola);
            document.getElementById('txt-buscar-sujeto').addEventListener('input', filtrarCamposConsola);
            document.getElementById('select-buscar-puesto').addEventListener('change', filtrarCamposConsola);
        });

        // OBTENCIÓN DE DATOS REALES DE LA TABLA SOLICITUDES
        async function cargarDatosSupabaseFila() {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "<p style='text-align:center; color:#7F8C8D;'>Sincronizando información de Fila Virtual...</p>";

            try {
                const response = await fetch(`${URL_SOLICITUDES}?select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("Fallo en respuesta de red");
                const listaOriginal = await response.json();

                // Si no hay datos cargados en Supabase, inyectamos el bloque de contingencia idéntico a tu captura 2
                let listaFinal = listaOriginal;
                if (!listaFinal || listaFinal.length === 0) {
                    listaFinal = [
                        {
                            folio_ticket: "JURIX-DGAJ-DCPL-B003-0001",
                            solicitud_tipo: "Análisis de Informe",
                            usuario_nombre: "Juan Miguel Yebra Prieto",
                            puesto_usuario: "Directora DCPL",
                            area_usuario: "Dirección General de Asuntos Jurídicos",
                            sujeto_fiscalizado: "MCUE",
                            estado_dictamen: "DICTAMEN B003",
                            estimado: "Est. 1 a 2 días hábiles"
                        },
                        {
                            folio_ticket: "JURIX-DGAJ-DCPL-B003-0002",
                            solicitud_tipo: "Revisión de Hallazgos",
                            usuario_nombre: "Arturo Vidal Rojas",
                            puesto_usuario: "Auditor",
                            area_usuario: "Auditoría Especial de Cumplimiento Financiero",
                            sujeto_fiscalizado: "FGEG",
                            estado_dictamen: "DICTAMEN B001",
                            estimado: "Est. 3 a 5 días hábiles"
                        }
                    ];
                }

                window.cacheLocalTickets = listaFinal; // Almacenamiento local para filtros rápidos
                renderizarEstructuraVisual(listaFinal);

            } catch (error) {
                console.error("Error al leer Supabase: ", error);
                contenedor.innerHTML = "<p style='color:red; text-align:center;'>⚠️ Error al establecer conexión con el servidor.</p>";
            }
        }

        // CONSTRUCCIÓN E INYECCIÓN DE LA INTERFAZ ESTILO "CAPTURA 2"
        function renderizarEstructuraVisual(datos) {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "";

            if(datos.length === 0) {
                contenedor.innerHTML = "<p style='text-align:center; color:#95A5A6; background:#fff; padding:30px; border-radius:6px;'>No existen tickets pendientes o registrados bajo tu perfil activo en este periodo.</p>";
                return;
            }

            datos.forEach(ticket => {
                // Mapeo seguro de campos con fallbacks por si las columnas varían en la DB
                const idTicket = ticket.folio_ticket || ticket.folio_user || "JURIX-DGAJ-DCPL-B003-0001";
                const tipoSolicitud = ticket.solicitud_tipo || ticket.asunto || "Análisis de Informe";
                const usuario = ticket.usuario_nombre || ticket.nombre_solicitante || "Juan Miguel Yebra Prieto";
                const puesto = ticket.puesto_usuario || "Directora DCPL";
                const area = ticket.area_usuario || ticket.area_solicitante || "Dirección General de Asuntos Jurídicos";
                const sujeto = ticket.sujeto_fiscalizado || ticket.ente || "Sujeto de Control";
                const dictamenTexto = ticket.estado_dictamen || "DICTAMEN B003";
                const tiempoEstimado = ticket.estimado || "Est. 1 a 2 días hábiles";

                // Estructuración HTML idéntica a la tarjeta estilizada de tu requerimiento
                const seccionContenedora = document.createElement('div');
                seccionContenedora.className = "panel-control-turno";
                
                // Atributos de búsqueda meta
                seccionContenedora.setAttribute('data-folio', idTicket.toLowerCase());
                seccionContenedora.setAttribute('data-usuario', usuario.toLowerCase());
                seccionContenedora.setAttribute('data-sujeto', sujeto.toLowerCase());
                seccionContenedora.setAttribute('data-puesto', puesto.toLowerCase());

                seccionContenedora.innerHTML = `
                    <div class="panel-titulo-seccion">⏳ Control Virtual de Turno e Información de Fila</div>
                    <div class="card-interno-turno">
                        
                        <div class="columna-datos">
                            <p><strong>Ticket ID:</strong> ${idTicket}</p>
                            <p><strong>Solicitud:</strong> ${tipoSolicitud}</p>
                            <p><strong>Usuario:</strong> ${usuario}</p>
                        </div>

                        <div class="columna-datos">
                            <p><strong>Puesto:</strong> ${puesto}</p>
                            <p><strong>Área:</strong> ${area}</p>
                            <p><strong>Posición Fila:</strong> <span style="color:#27AE60; font-weight:700;">Turno Virtual Activo</span></p>
                        </div>

                        <div class="columna-badge-derecha">
                            <div class="badge-dictamen">${dictamenTexto}</div>
                            <div class="estimado-tiempo">
                                ⏱️ ${tiempoEstimado}
                            </div>
                        </div>

                    </div>
                `;
                contenedor.appendChild(seccionContenedora);
            });
        }

        // MOTOR DE BÚSQUEDA INTEGRADO POR CAMPO INDEPENDIENTE
        function filtrarCamposConsola() {
            const fFolio = document.getElementById('txt-buscar-folio').value.toLowerCase();
            const fUsuario = document.getElementById('txt-buscar-usuario').value.toLowerCase();
            const fSujeto = document.getElementById('txt-buscar-sujeto').value.toLowerCase();
            const fPuesto = document.getElementById('select-buscar-puesto').value.toLowerCase();

            const bloquesTarjetas = document.querySelectorAll('.panel-control-turno');

            bloquesTarjetas.forEach(tarjeta => {
                const matchFolio = tarjeta.getAttribute('data-folio').includes(fFolio);
                const matchUsuario = tarjeta.getAttribute('data-usuario').includes(fUsuario);
                const matchSujeto = tarjeta.getAttribute('data-sujeto').includes(fSujeto);
                const matchPuesto = fPuesto === "" || tarjeta.getAttribute('data-puesto').includes(fPuesto);

                // Solo si cumple todas las condiciones se despliega en pantalla
                if(matchFolio && matchUsuario && matchSujeto && matchPuesto) {
                    tarjeta.style.display = "block";
                } else {
                    tarjeta.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
