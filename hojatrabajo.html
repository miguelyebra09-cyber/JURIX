<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Hoja de Trabajo (Vinculación Directa)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #2c3e50;
            --gris-claro: #f8f9fa;
            --blanco: #ffffff;
            --azul-info: #0066cc;
            --azul-hover: #0052a3;
            --azul-borde: #bee3f8;
            --azul-fondo: #ebf8ff;
            --verde-exito: #2ecc71;
            --sombra: 0 4px 15px rgba(0,0,0,0.06);
            --transicion: all 0.25s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--blanco);
            padding: 12px 40px;
            border-bottom: 3px solid var(--naranja-nitido);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .upload-zone {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            background-color: var(--naranja-nitido);
            color: var(--blanco);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            transition: var(--transicion);
            box-shadow: 0 4px 6px rgba(255, 102, 0, 0.15);
        }

        .btn-upload:hover {
            background-color: #e05500;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        .document-viewer {
            flex: 6;
            background-color: #bdc3c7;
            border-radius: 8px;
            box-shadow: var(--sombra);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .word-content-render {
            background: white;
            padding: 40px;
            width: 85%;
            min-height: 297mm;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 4px;
            line-height: 1.6;
            font-size: 1rem;
        }

        .comments-sidebar {
            flex: 4;
            background-color: var(--blanco);
            border-radius: 8px;
            box-shadow: var(--sombra);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid #e2e8f0;
        }

        .sidebar-header {
            background-color: var(--gris-oscuro);
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-badge {
            background-color: var(--naranja-nitido);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .comment-card {
            background-color: var(--gris-claro);
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--naranja-nitido);
            border-radius: 6px;
            padding: 14px;
            transition: var(--transicion);
        }

        .comment-author-box {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--gris-oscuro);
            margin-bottom: 6px;
        }

        .text-selected-box {
            font-size: 0.85rem;
            background-color: var(--azul-fondo);
            border: 1px dashed var(--azul-borde);
            padding: 8px;
            border-radius: 4px;
            color: #2b6cb0;
            margin-bottom: 8px;
            font-style: italic;
        }

        .comment-text-box {
            font-size: 0.92rem;
            color: #1a202c;
            font-weight: 500;
            background: #fff;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #edf2f7;
            margin-bottom: 10px;
        }

        /* Botón de Vinculación */
        .btn-vincular-comentario {
            background-color: var(--azul-info);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transicion);
        }

        .btn-vincular-comentario:hover {
            background-color: var(--azul-hover);
        }

        .no-data-msg {
            text-align: center;
            color: #a0aec0;
            margin-top: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ - Módulo Hoja de Trabajo</h1>
        <div class="upload-zone">
            <span style="font-size: 0.9rem; font-weight: bold;">Folio Ticket Activo:</span>
            <input type="text" id="txtFolioManual" placeholder="Ej: F-2026-001" style="padding: 6px; border-radius: 4px; border:1px solid #ccc; width: 120px;">
            <div class="file-input-wrapper">
                <button class="btn-upload">📁 Cargar Cédula Word</button>
                <input type="file" id="filePicker" accept=".docx" onchange="analizarWordConComentarios(this)">
            </div>
            <span id="fileNameLabel" style="font-size: 0.85rem; color: #718096;">Ninguno seleccionado</span>
        </div>
    </header>

    <div class="workspace">
        <div id="documentViewer" class="document-viewer">
            <div class="no-data-msg">Sube la Cédula de Hallazgo de prueba para mapear sus marcas de revisión.</div>
        </div>

        <div class="comments-sidebar">
            <div class="sidebar-header">
                <span>💬 Comentarios Nativos Word</span>
                <span id="lblContadorComentarios" class="counter-badge">0 Comentarios</span>
            </div>
            <div id="commentsList" class="comments-list">
                <div class="no-data-msg">Esperando archivo...</div>
            </div>
        </div>
    </div>

    <script>
        const URL_HALLAZGOS = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/hallazgos";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYmxuZmVodGx5YWh0aW1ybXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjgwMTAsImV4cCI6MjA5NjgwNDAxMH0.FOobuUenvdDfxAc3lgqwruFE2AmcnnTdZhXzWPDrSd4";

        // Intentar rescatar el último folio activo del localStorage de JURIX
        window.addEventListener('DOMContentLoaded', () => {
            const folioGuardado = localStorage.getItem('jurix_folio_activo') || localStorage.getItem('folio_user') || "";
            if(folioGuardado) {
                document.getElementById('txtFolioManual').value = folioGuardado;
            }
        });

        async function analizarWordConComentarios(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('fileNameLabel').innerText = file.name;
            const viewer = document.getElementById('documentViewer');
            const commentsContainer = document.getElementById('commentsList');
            
            viewer.innerHTML = '<div class="no-data-msg">Abriendo marcas XML...</div>';
            commentsContainer.innerHTML = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);
                let mapaComentarios = {};

                // 1. Extraer comentarios del Standard XML de Office
                if (zip.file("word/comments.xml")) {
                    const commentsXmlText = await zip.file("word/comments.xml").async("text");
                    const xmlDoc = new DOMParser().parseFromString(commentsXmlText, "text/xml");
                    const commentsElements = xmlDoc.getElementsByTagName("w:comment");
                    
                    for (let i = 0; i < commentsElements.length; i++) {
                        let cEl = commentsElements[i];
                        let id = cEl.getAttribute("w:id");
                        let autor = cEl.getAttribute("w:author") || "Revisor DGAJ";
                        
                        let textNodes = cEl.getElementsByTagName("w:t");
                        let comentarioTexto = "";
                        for (let j = 0; j < textNodes.length; j++) {
                            comentarioTexto += textNodes[j].textContent + " ";
                        }

                        mapaComentarios[id] = {
                            id: id,
                            autor: autor,
                            comentario: comentarioTexto.trim(),
                            textoSeleccionado: ""
                        };
                    }
                }

                // 2. Extraer fragmento de texto original seleccionado
                if (zip.file("word/document.xml")) {
                    const docXmlText = await zip.file("word/document.xml").async("text");
                    const xmlDoc = new DOMParser().parseFromString(docXmlText, "text/xml");
                    const rangesStart = xmlDoc.getElementsByTagName("w:commentRangeStart");
                    
                    for(let i=0; i < rangesStart.length; i++) {
                        let id = rangesStart[i].getAttribute("w:id");
                        if (mapaComentarios[id]) {
                            let textoResaltado = "";
                            let siguienteNodo = rangesStart[i].nextSibling;
                            while(siguienteNodo && siguienteNodo.nodeName !== "w:commentRangeEnd") {
                                if(siguienteNodo.getElementsByTagName) {
                                    let ts = siguienteNodo.getElementsByTagName("w:t");
                                    for(let k=0; k<ts.length; k++) {
                                        textoResaltado += ts[k].textContent;
                                    }
                                }
                                siguienteNodo = siguienteNodo.nextSibling;
                            }
                            mapaComentarios[id].textoSeleccionado = textoResaltado.trim();
                        }
                    }
                }

                // 3. Renderizar texto plano amigable a HTML
                const renderResult = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
                viewer.innerHTML = '';
                const divRender = document.createElement('div');
                divRender.className = 'word-content-render';
                divRender.innerHTML = renderResult.value;
                viewer.appendChild(divRender);

                let listaComentariosFinal = Object.values(mapaComentarios).filter(c => c.comentario.length > 0);
                inyectarComentariosSidebar(listaComentariosFinal);

            } catch (error) {
                console.error(error);
                viewer.innerHTML = '<div class="no-data-msg">Error de lectura estructural.</div>';
            }
        }

        function inyectarComentariosSidebar(lista) {
            const container = document.getElementById('commentsList');
            container.innerHTML = '';
            document.getElementById('lblContadorComentarios').innerText = `${lista.length} Comentarios`;

            if (lista.length === 0) {
                container.innerHTML = `<div class="no-data-msg">No se detectaron hilos de revisión.</div>`;
                return;
            }

            lista.forEach((c, index) => {
                const card = document.createElement('div');
                card.className = 'comment-card';
                
                // Sanitizar comillas para pasar de forma segura como argumentos en JavaScript
                const comentarioEscapado = c.comentario.replace(/'/g, "\\'").replace(/"/g, '\\"');
                const textoEscapado = (c.textoSeleccionado || "Texto de Referencia").replace(/'/g, "\\'").replace(/"/g, '\\"');

                card.innerHTML = `
                    <div class="comment-author-box">
                        👤 <strong>Autor:</strong> ${c.autor}
                    </div>
                    <div class="text-selected-box">
                        🎯 <strong>Texto Original:</strong> "${c.textoSeleccionado || 'N/A'}"
                    </div>
                    <div class="comment-text-box">
                        💬 ${c.comentario}
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-vincular-comentario" onclick="ejecutarVinculacionSupabase('${comentarioEscapado}', '${textoEscapado}', 'sustancia')">
                            🔗 Vincular a Sustancia
                        </button>
                        <button class="btn-vincular-comentario" style="background:#27ae60;" onclick="ejecutarVinculacionSupabase('${comentarioEscapado}', '${textoEscapado}', 'concepto')">
                            🧠 Vincular a Concepto
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // =========================================================================
        // ACCIÓN DE VINCULACIÓN EN CALIENTE CON LA BASE DE DATOS SUPABASE
        // =========================================================================
        async function ejecutarVinculacionSupabase(comentarioText, textoOriginal, destino) {
            const folioTicket = document.getElementById('txtFolioManual').value.trim();
            
            if(!folioTicket) {
                alert("⚠️ Por favor introduce o valida el Folio del Ticket en la parte superior para poder guardarlo en Supabase.");
                return;
            }

            // Mapear columnas reales del esquema relacional de JURIX-DGAJ
            let payload = {};
            if(destino === 'sustancia') {
                payload.sustancia_hallazgo = comentarioText;
            } else {
                payload.sintesis_condicion = comentarioText;
            }

            // También podemos adjuntar el texto original en las palabras clave si está libre
            payload.palabras_clave_ia = `Texto analizado: ${textoOriginal}`;

            try {
                const urlFiltro = `${URL_HALLAZGOS}?folio_user=eq.${encodeURIComponent(folioTicket)}`;
                
                const response = await fetch(urlFiltro, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert(`✅ ¡Éxito! El comentario fue vinculado correctamente al folio: ${folioTicket} en el campo [${destino === 'sustancia' ? 'Sustancia del Hallazgo' : 'Concepto Central'}].`);
                } else {
                    alert("❌ Error de coincidencia: El folio ingresado no existe en Supabase o los campos tienen restricciones.");
                }
            } catch (error) {
                console.error(error);
                alert("❌ Error crítico de conexión de red.");
            }
        }
    </script>
</body>
</html>
