<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Hoja de Trabajo (Comentarios Nativos)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #2c3e50;
            --gris-claro: #f8f9fa;
            --blanco: #ffffff;
            --azul-info: #0066cc;
            --azul-borde: #bee3f8;
            --azul-fondo: #ebf8ff;
            --sombra: 0 4px 15px rgba(0,0,0,0.06);
            --transicion: all 0.25s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--blanco);
            padding: 12px 40px;
            border-bottom: 3px solid var(--naranja-nitido);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .upload-zone {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            background-color: var(--naranja-nitido);
            color: var(--blanco);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            transition: var(--transicion);
            box-shadow: 0 4px 6px rgba(255, 102, 0, 0.15);
        }

        .btn-upload:hover {
            background-color: #e05500;
            transform: translateY(-1px);
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        /* Visor Izquierdo */
        .document-viewer {
            flex: 6;
            background-color: #bdc3c7;
            border-radius: 8px;
            box-shadow: var(--sombra);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .word-content-render {
            background: white;
            padding: 40px;
            width: 85%;
            min-height: 297mm;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 4px;
            line-height: 1.6;
            font-size: 1rem;
        }

        /* Resaltados simulados en el documento renderizado */
        .word-content-render comment-ref {
            background-color: #fff3cd;
            border-bottom: 2px dashed #ffc107;
            cursor: pointer;
        }

        /* Barra Lateral Derecha */
        .comments-sidebar {
            flex: 4;
            background-color: var(--blanco);
            border-radius: 8px;
            box-shadow: var(--sombra);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid #e2e8f0;
        }

        .sidebar-header {
            background-color: var(--gris-oscuro);
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-badge {
            background-color: var(--naranja-nitido);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Tarjetas de comentarios corregidas */
        .comment-card {
            background-color: var(--gris-claro);
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--naranja-nitido);
            border-radius: 6px;
            padding: 14px;
            transition: var(--transicion);
        }

        .comment-card:hover {
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            background-color: #fff;
        }

        .comment-author-box {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--gris-oscuro);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .text-selected-box {
            font-size: 0.85rem;
            background-color: var(--azul-fondo);
            border: 1px dashed var(--azul-borde);
            padding: 8px;
            border-radius: 4px;
            color: #2b6cb0;
            margin-bottom: 8px;
            font-style: italic;
        }

        .comment-text-box {
            font-size: 0.92rem;
            color: #1a202c;
            font-weight: 500;
            line-height: 1.4;
            background: #fff;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #edf2f7;
        }

        .no-data-msg {
            text-align: center;
            color: #a0aec0;
            margin-top: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ - Módulo Hoja de Trabajo</h1>
        <div class="upload-zone">
            <div class="file-input-wrapper">
                <button class="btn-upload">📁 Seleccionar Documento Word (.docx)</button>
                <input type="file" id="filePicker" accept=".docx" onchange="analizarWordConComentarios(this)">
            </div>
            <span id="fileNameLabel" style="font-size: 0.85rem; color: #718096; font-weight: 500;">Ningún archivo seleccionado</span>
        </div>
    </header>

    <div class="workspace">
        <div id="documentViewer" class="document-viewer">
            <div class="no-data-msg" id="viewerPlaceholder">Sube la Cédula de Hallazgo de prueba para mapear sus hilos de revisión internos.</div>
        </div>

        <div class="comments-sidebar">
            <div class="sidebar-header">
                <span>💬 Comentarios y Notas Técnicas</span>
                <span id="lblContadorComentarios" class="counter-badge">0 Comentarios</span>
            </div>
            <div id="commentsList" class="comments-list">
                <div class="no-data-msg">Esperando extracción de marcas XML...</div>
            </div>
        </div>
    </div>

    <script>
        async function analizarWordConComentarios(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('fileNameLabel').innerText = file.name;
            const viewer = document.getElementById('documentViewer');
            const commentsContainer = document.getElementById('commentsList');
            
            viewer.innerHTML = '<div class="no-data-msg">Procesando mapa de marcas estructurales...</div>';
            commentsContainer.innerHTML = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                
                // 1. Descomprimir el archivo .docx usando JSZip para leer los XML internos de Microsoft Word
                const zip = await JSZip.loadAsync(arrayBuffer);
                
                // Diccionario para guardar comentarios extraídos del XML estructurado
                let mapaComentarios = {};

                // Examinar si el archivo contiene el paquete nativo de comentarios de Word
                if (zip.file("word/comments.xml")) {
                    const commentsXmlText = await zip.file("word/comments.xml").async("text");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(commentsXmlText, "text/xml");
                    
                    // Buscar todas las etiquetas estructurales <w:comment>
                    const commentsElements = xmlDoc.getElementsByTagName("w:comment");
                    
                    for (let i = 0; i < commentsElements.length; i++) {
                        let cEl = commentsElements[i];
                        let id = cEl.getAttribute("w:id");
                        let autor = cEl.getAttribute("w:author") || "Revisor Anónimo";
                        let fecha = cEl.getAttribute("w:date") || "";
                        
                        // Extraer el texto del comentario sumando sus fragmentos (<w:t>)
                        let textNodes = cEl.getElementsByTagName("w:t");
                        let comentarioTexto = "";
                        for (let j = 0; j < textNodes.length; j++) {
                            comentarioTexto += textNodes[j].textContent + " ";
                        }

                        mapaComentarios[id] = {
                            id: id,
                            autor: autor,
                            fecha: fecha.split("T")[0], // Simplificar fecha
                            comentario: comentarioTexto.trim(),
                            textoSeleccionado: "" // Se llenará al parsear el documento principal
                        };
                    }
                }

                // 2. Extraer el texto principal y ligar en qué palabras se hicieron las anotaciones
                if (zip.file("word/document.xml")) {
                    const docXmlText = await zip.file("word/document.xml").async("text");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(docXmlText, "text/xml");
                    
                    // Buscar los rangos donde inicia un comentario en el documento (<w:commentRangeStart>)
                    const rangesStart = xmlDoc.getElementsByTagName("w:commentRangeStart");
                    
                    for(let i=0; i < rangesStart.length; i++) {
                        let id = rangesStart[i].getAttribute("w:id");
                        if (mapaComentarios[id]) {
                            // Buscar nodos hermanos para extraer el texto exacto seleccionado en Word
                            let textoResaltado = "";
                            let siguienteNodo = rangesStart[i].nextSibling;
                            
                            while(siguienteNodo && siguienteNodo.nodeName !== "w:commentRangeEnd") {
                                if(siguienteNodo.getElementsByTagName) {
                                    let ts = siguienteNodo.getElementsByTagName("w:t");
                                    for(let k=0; k<ts.length; k++) {
                                        textoResaltado += ts[k].textContent;
                                    }
                                }
                                siguienteNodo = siguienteNodo.nextSibling;
                            }
                            mapaComentarios[id].textoSeleccionado = textoResaltado.trim() || "[Texto/Objeto Seleccionado]";
                        }
                    }
                }

                // 3. Renderizar el cuerpo del documento en el panel izquierdo usando Mammoth
                const renderResult = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
                viewer.innerHTML = '';
                const divRender = document.createElement('div');
                divRender.className = 'word-content-render';
                divRender.innerHTML = renderResult.value;
                viewer.appendChild(divRender);

                // Convertir el mapa a un arreglo plano y limpiar vacíos
                let listaComentariosFinal = Object.values(mapaComentarios).filter(c => c.comentario.length > 0);

                // Si por alguna razón la estructura XML falló, aplicamos extracción predictiva secundaria
                if(listaComentariosFinal.length === 0) {
                    const rawTextResult = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                    let lineas = rawTextResult.value.split("\n");
                    lineas.forEach((l, idx) => {
                        if(l.includes("✍️") || l.toLowerCase().includes("comentario") || l.trim().startsWith("[")) {
                            listaComentariosFinal.push({
                                id: idx,
                                autor: "Auditor Revisor",
                                fecha: "Reciente",
                                textoSeleccionado: "Fragmento de Párrafo de Cédula",
                                comentario: l
                            });
                        }
                    });
                }

                // 4. Inyectar las tarjetas con los datos requeridos (Quién lo hizo, En qué parte y Qué dice)
                inyectarComentariosSidebar(listaComentariosFinal);

            } catch (error) {
                console.error(error);
                alert("Error crítico al procesar los hilos de comentarios del archivo .docx");
                viewer.innerHTML = '<div class="no-data-msg">Error al cargar el documento.</div>';
            }
        }

        function inyectarComentariosSidebar(lista) {
            const container = document.getElementById('commentsList');
            container.innerHTML = '';
            document.getElementById('lblContadorComentarios').innerText = `${lista.length} Comentarios`;

            if (lista.length === 0) {
                container.innerHTML = `<div class="no-data-msg">No se encontraron comentarios incrustados por revisores en las marcas de este Word.</div>`;
                return;
            }

            lista.forEach(c => {
                const card = document.createElement('div');
                card.className = 'comment-card';
                card.innerHTML = `
                    <div class="comment-author-box">
                        👤 <strong>Revisor:</strong> ${c.autor} <span style="color:#718096; font-weight:normal; margin-left:auto;">📅 ${c.fecha}</span>
                    </div>
                    <div class="text-selected-box">
                        🎯 <strong>Parte del Documento:</strong> "${c.textoSeleccionado || 'Texto bajo revisión'}"
                    </div>
                    <div class="comment-text-box">
                        💬 ${c.comentario}
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
