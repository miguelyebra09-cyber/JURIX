<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Inicio de Sesión</title>
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #333333;
            --gris-claro: #f4f4f9;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--gris-oscuro) 0%, #1e1e1e 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--gris-oscuro);
        }

        .login-container {
            background-color: var(--blanco);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--naranja-nitido);
        }

        .logo-zone {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-zone h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: 1.5px;
        }

        .logo-zone p {
            margin: 5px 0 0 0;
            color: #777;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--naranja-nitido);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--naranja-nitido);
            color: var(--blanco);
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #e05500;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }

        .register-link a {
            color: var(--naranja-nitido);
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-zone">
            <h1>JURIX</h1>
            <p>Dirección General de Asuntos Jurídicos</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario / Correo Electrónico:</label>
                <input type="text" id="usuario" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Ingresar al Sistema</button>
        </form>

        <div class="register-link">
            ¿No tienes cuenta? <a href="new_user.html">Registrarse aquí</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/usuarios";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usuarioInput = document.getElementById('usuario').value.trim();
            const passwordInput = document.getElementById('password').value;

            try {
                // Consultar directamente en Supabase si el usuario y la contraseña coinciden
                const response = await fetch(`${SUPABASE_URL}?usuario=eq.${encodeURIComponent(usuarioInput)}&password=eq.${encodeURIComponent(passwordInput)}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                const usuariosEncotrados = await response.json();

                if (response.ok && usuariosEncotrados.length > 0) {
                    const usuarioActivo = usuariosEncotrados[0];
                    
                    // SEGURIDAD: Guardar la sesión y datos del perfil para intercomunicación entre páginas
                    localStorage.setItem('jurix_sesion_activa', 'true');
                    localStorage.setItem('jurix_perfil', usuarioActivo.perfil);
                    localStorage.setItem('last_user_name', usuarioActivo.nombre_completo);
                    localStorage.setItem('last_user_area', usuarioActivo.area);
                    localStorage.setItem('last_user_puesto', usuarioActivo.puesto);

                    alert(`¡Bienvenido al sistema JURIX!\nSesión iniciada como: ${usuarioActivo.nombre_completo}`);
                    
                    // Ruteo Inteligente: Los redirige directamente a la zona que les corresponde
                    if (usuarioActivo.perfil === 'usuario') {
                        window.location.href = "solicitud.html";
                    } else {
                        window.location.href = "estatus.html";
                    }
                } else {
                    alert("Credenciales incorrectas. Verifique su usuario y contraseña.");
                }

            } catch (error) {
                console.error("Error de conexión:", error);
                alert("Error de red al intentar conectar con la base de datos de Supabase.");
            }
        });
    </script>
</body>
</html>
