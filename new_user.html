<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX - Registro de Nuevo Usuario</title>
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #333333;
            --gris-claro: #f4f4f9;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background-color: var(--blanco);
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            border-left: 6px solid var(--naranja-nitido);
            margin: 20px;
        }

        h2 {
            margin-top: 0;
            color: var(--gris-oscuro);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-save {
            background-color: var(--naranja-nitido);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .btn-save:hover { background-color: #e05500; }

        .back-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .back-link a { color: #555; text-decoration: none; }
        .back-link a:hover { color: var(--naranja-nitido); }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Registro de Personal - Alta JURIX</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="reg_nombre">Nombre Completo:</label>
                <input type="text" id="reg_nombre" required placeholder="Ej. LIC. MIGUEL YEBRA">
            </div>

            <div class="form-group">
                <label for="reg_usuario">Usuario / Correo Institucional:</label>
                <input type="text" id="reg_usuario" required placeholder="usuario@correo.com">
            </div>

            <div class="form-group">
                <label for="reg_password">Contraseña de Acceso:</label>
                <input type="password" id="reg_password" required placeholder="Mínimo 5 caracteres">
            </div>

            <div class="form-group">
                <label for="reg_area">Área de Adscripción:</label>
                <select id="reg_area" required>
                    <option value="" disabled selected>-- Seleccione Área --</option>
                    <option value="DCPL">DCPL - Dictámenes y Contencioso</option>
                    <option value="AECF">AECF - Auditoría Financiera</option>
                    <option value="DINV">DINV - Investigación</option>
                </select>
            </div>

            <div class="form-group">
                <label for="reg_puesto">Puesto Oficial:</label>
                <input type="text" id="reg_puesto" required placeholder="Ej. Auditor Especial 2">
            </div>

            <div class="form-group">
                <label for="reg_perfil">Nivel de Acceso (Rol):</label>
                <select id="reg_perfil" required>
                    <option value="usuario">Usuario Solicitante (Solo sus folios)</option>
                    <option value="supervisor">Supervisor Técnico (Filtros y Prórrogas)</option>
                    <option value="administrador">Administrador DGAJ (Control Total)</option>
                </select>
            </div>

            <button type="submit" class="btn-save">Registrar Personal</button>
        </form>
        <div class="back-link">
            <a href="index.html">← Regresar al Inicio de Sesión</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/usuarios";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                nombre_completo: document.getElementById('reg_nombre').value.toUpperCase(),
                usuario: document.getElementById('reg_usuario').value.trim(),
                password: document.getElementById('reg_password').value,
                area: document.getElementById('reg_area').value,
                puesto: document.getElementById('reg_puesto').value,
                perfil: document.getElementById('reg_perfil').value
            };

            try {
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("¡Usuario registrado con éxito en Supabase!\nYa puede iniciar sesión.");
                    window.location.href = "index.html";
                } else {
                    alert("Error en el registro. Es posible que el nombre de usuario ya esté ocupado.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Fallo de conexión con la base de datos.");
            }
        });
    </script>
</body>
</html>
