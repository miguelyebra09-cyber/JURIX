<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX - Registrar Ticket</title>
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --naranja-neon: #ff9e59;
            --gris-oscuro: #333333;
            --gris-fondo: #1e1e1e;
            --blanco: #ffffff;
            --rojo-alerta: #ff3333;
            --gris-input: #2a2a2a;
            --gris-borde: #444444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--gris-oscuro) 0%, var(--gris-fondo) 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--blanco);
        }

        /* Barra Superior de Usuario */
        .top-bar {
            background-color: rgba(51, 51, 51, 0.9);
            border-bottom: 4px solid var(--naranja-nitido);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo-section h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .user-info-section {
            background: rgba(255, 102, 0, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--naranja-nitido);
            font-size: 0.95rem;
        }

        .user-info-section span {
            font-weight: bold;
            color: var(--naranja-nitido);
            text-transform: uppercase;
        }

        /* Contenedor del Formulario */
        .form-container {
            max-width: 850px;
            margin: 40px auto;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 40px;
            border-top: 5px solid var(--naranja-nitido);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h2 {
            border-left: 5px solid var(--naranja-nitido);
            padding-left: 15px;
            margin-bottom: 30px;
            font-weight: 600;
            color: var(--blanco);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--naranja-neon);
            font-size: 0.95rem;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--gris-input);
            border: 1px solid var(--gris-borde);
            border-radius: 6px;
            color: var(--blanco);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--naranja-nitido);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
        }

        input[readonly] {
            background-color: #222222;
            color: #888888;
            border-color: #333333;
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background-color: var(--blanco);
            color: var(--gris-oscuro);
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid transparent;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-submit:hover {
            background-color: var(--gris-oscuro);
            color: var(--blanco);
            border-color: var(--naranja-nitido);
            box-shadow: 0 0 15px var(--naranja-nitido);
        }

        .btn-logout {
            background: none;
            border: 1px solid #777;
            color: #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 15px;
            font-size: 0.8rem;
        }
        .btn-logout:hover {
            background: var(--rojo-alerta);
            color: white;
            border-color: var(--rojo-alerta);
        }

        .btn-back {
            display: inline-block;
            background: none;
            border: 1px solid var(--naranja-nitido);
            color: var(--naranja-neon);
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background-color: var(--naranja-nitido);
            color: var(--blanco);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-section">
            <h1>JURIX</h1>
        </div>
        <div class="user-info-section">
            Usuario: <span id="lblNombre">Cargando...</span> | Rol: <span id="lblRol">-</span>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="form-container">
        <a href="menu.html" class="btn-back">← Volver al Menú</a>
        <h2>Registrar Ticket de Servicio</h2>
        
        <form id="ticketForm">
            <div class="form-group">
                <label for="user_nombre">Nombre del Servidor Público Solicitante:</label>
                <input type="text" id="user_nombre" readonly required>
            </div>

            <div class="form-group">
                <label for="user_puesto">Puesto:</label>
                <input type="text" id="user_puesto" readonly required>
            </div>

            <div class="form-group">
                <label for="user_area">Área de Adscripción:</label>
                <input type="text" id="user_area" readonly required>
            </div>

            <div class="form-group">
                <label for="cmbServicios">Servicio Solicitado:</label>
                <select id="cmbServicios" required>
                    <option value="" disabled selected>-- Seleccione Servicio --</option>
                    <option value="DCPL_A001">DCPL-A001 | Consulta Jurídica</option>
                    <option value="DCPL_B001">DCPL-B001 | Análisis de Hallazgo de Auditoría</option>
                    <option value="DCPL_B002">DCPL-B002 | Análisis de Pliego de Observaciones</option>
                    <option value="DCPL_B003">DCPL-B003 | Análisis de Informe de Presunta Responsabilidad</option>
                    <option value="DCPL_C001">DCPL-C001 | Formulación de Denuncia</option>
                    <option value="DCPL_D001">DCPL-D001 | Emisión de Tarjeta Informativa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="txtEnte">Ente Fiscalizado (Siglas, Ej. Celaya, Guanajuato):</label>
                <input type="text" id="txtEnte" placeholder="Ingrese el Ente Fiscalizado..." required>
            </div>

            <div class="form-group">
                <label for="txtNumAuditoria">Número de Auditoría / Expediente:</label>
                <input type="text" id="txtNumAuditoria" placeholder="Ej. AE-045-2024" required>
            </div>

            <div class="form-group">
                <label for="cmbEjercicio">Ejercicio Fiscal Auditado:</label>
                <select id="cmbEjercicio" required>
                    <option value="" disabled selected>-- Seleccione Ejercicio --</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>

            <div class="form-group">
                <label for="txtObservacion">Número de Observación / Hallazgo / Párrafo Específico:</label>
                <input type="text" id="txtObservacion" placeholder="Ej. Observación 1, Hallazgo 4, Párrafo 2..." required>
            </div>

            <div class="form-group">
                <label for="txtDescripcion">Descripción Breve o Justificación del Asunto:</label>
                <textarea id="txtDescripcion" placeholder="Describe detalladamente el asunto o la petición legal..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Generar y Registrar Ticket</button>
        </form>
    </div>

    <script>
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";
        const URL_REGISTRO_TICKET = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/tickets_jurix";

        // Validación y Carga de Sesión
        const sesionActiva = localStorage.getItem('jurix_sesion_activa');
        const rawRol = localStorage.getItem('jurix_perfil') || ""; 
        const userName = localStorage.getItem('last_user_name');
        const userArea = localStorage.getItem('last_user_area');
        const userPuesto = localStorage.getItem('last_user_puesto');

        if (sesionActiva !== 'true' || !rawRol) {
            alert("No has iniciado sesión o tu sesión expiró.");
            window.location.href = "index.html";
        }

        // Establecer textos e inputs de lectura obligatorios
        document.getElementById('lblNombre').textContent = userName || "Desconocido";
        document.getElementById('lblRol').textContent = rawRol;
        
        document.getElementById('user_nombre').value = userName || "";
        document.getElementById('user_puesto').value = userPuesto || "";
        document.getElementById('user_area').value = userArea || "";

        // Procesamiento y Guardado
        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const servicioSeleccionado = document.getElementById('cmbServicios').value;
            const ente = document.getElementById('txtEnte').value;
            const numAuditoria = document.getElementById('txtNumAuditoria').value;
            const ejercicio = document.getElementById('cmbEjercicio').value;
            const observacion = document.getElementById('txtObservacion').value;
            const descripcion = document.getElementById('txtDescripcion').value;

            // LÓGICA DE FOLIO FIEL: Cambia el formato final dependiendo del value del combobox
            const numeroConsecutivo = Math.floor(1000 + Math.random() * 9000); 
            let sufijoCodigo = "GEN";

            if (servicioSeleccionado === "DCPL_A001") sufijoCodigo = "A001";
            else if (servicioSeleccionado === "DCPL_B001") sufijoCodigo = "B001";
            else if (servicioSeleccionado === "DCPL_B002") sufijoCodigo = "B002";
            else if (servicioSeleccionado === "DCPL_B003") sufijoCodigo = "B003";
            else if (servicioSeleccionado === "DCPL_C001") sufijoCodigo = "C001";
            else if (servicioSeleccionado === "DCPL_D001") sufijoCodigo = "D001";

            const folioGenerado = `JURIX-DGAJ-DCPL-${sufijoCodigo}-${numeroConsecutivo}`;

            const payload = {
                folio: folioGenerado,
                solicitante: userName,
                puesto: userPuesto,
                area: userArea,
                servicio_solicitado: servicioSeleccionado,
                ente_fiscalizado: ente,
                numero_auditoria: numAuditoria,
                ejercicio_fiscal: ejercicio,
                numero_observacion: observacion,
                descripcion_asunto: descripcion,
                estatus: "Pendiente de Asignar",
                fecha_registro: new Date().toISOString()
            };

            try {
                const response = await fetch(URL_REGISTRO_TICKET, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // ADOPCIÓN FIEL de variables requeridas por páginas secundarias de tu sistema
                    localStorage.setItem('generated_folio', folioGenerado);
                    localStorage.setItem('jurix_folio_activo', folioGenerado);
                    localStorage.setItem('folio_ticket', folioGenerado);
                    localStorage.setItem('folio_user', folioGenerado);
                    
                    localStorage.setItem('usuario_nombre', userName);
                    localStorage.setItem('puesto_usuario', userPuesto);
                    localStorage.setItem('area_usuario', userArea);
                    
                    alert(`¡Ticket Registrado con Éxito!\nFolio Oficial Generado: ${folioGenerado}`);
                    
                    // Condicionamiento nativo hacia hallazgo si pertenece al bloque B de auditorías
                    if(servicioSeleccionado === 'DCPL_B001' || servicioSeleccionado === 'DCPL_B002' || servicioSeleccionado === 'DCPL_B003') {
                        window.location.href = `hallazgo.html?folio=${encodeURIComponent(folioGenerado)}`;
                    } else {
                        window.location.href = "menu.html";
                    }
                } else {
                    const err = await response.json();
                    console.error("Detalle de Base de Datos:", err);
                    alert("Error al intentar insertar el registro en Supabase.");
                }
            } catch (error) {
                console.error("Fallo de Red:", error);
                alert("Fallo crítico de comunicación con la API REST de Supabase.");
            }
        });

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
