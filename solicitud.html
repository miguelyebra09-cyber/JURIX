<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Generador de Tickets Corregido</title>
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #333333;
            --gris-claro: #f4f4f9;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            color: var(--gris-oscuro);
        }

        header {
            background-color: var(--blanco);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--naranja-nitido);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav {
            background-color: var(--gris-oscuro);
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--naranja-nitido);
        }

        .container {
            max-width: 650px;
            margin: 30px auto;
            background: var(--blanco);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--gris-oscuro);
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--naranja-nitido);
            outline: none;
        }

        .folio-box {
            background-color: #eef7ff;
            border-left: 5px solid #0066cc;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #0044cc;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button, .btn-cancelar {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: background 0.3s;
        }

        .btn-enviar {
            background-color: var(--naranja-nitido);
            color: var(--blanco);
        }

        .btn-enviar:hover {
            background-color: #e05500;
        }

        .btn-cancelar {
            background-color: #999999;
            color: var(--blanco);
        }

        .btn-cancelar:hover {
            background-color: #777777;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 10px 20px;
            background-color: #e1e1e1;
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #ccc;
        }

        .custom-file-upload:hover {
            background-color: #d2d2d2;
        }

        #file-name {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ</h1>
    </header>

    <nav>
        <a href="xxx.html">Opción 1</a>
        <a href="index.html">Salir</a>
    </nav>

    <div class="container">
        <h2>Ticket de Servicio - Área Jurídica</h2>
        
        <form id="ticketForm">
            <div class="form-group">
                <label for="nombre_user">Nombre Completo:</label>
                <input type="text" id="nombre_user" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="puesto_user">Puesto:</label>
                <input type="text" id="puesto_user" required placeholder="Ej. Analista Jurídico">
            </div>

            <div class="form-group">
                <label for="area_user">Área:</label>
                <input type="text" id="area_user" required placeholder="Ej. Dirección de lo Contencioso">
            </div>

            <div class="form-group">
                <label for="tipo_solicitud">Tipo de Solicitud:</label>
                <select id="tipo_solicitud" required onchange="calcularFolio()">
                    <option value="" disabled selected>-- Seleccione una opción --</option>
                    <option value="Consulta">Consulta</option>
                    <option value="Análisis Hallazgo">Análisis Hallazgo</option>
                    <option value="Analisis de Pliego">Analisis de Pliego</option>
                    <option value="Análisis de Informe">Análisis de Informe</option>
                    <option value="Denuncia">Denuncia</option>
                    <option value="Tarjeta Informativa">Tarjeta Informativa</option>
                    <option value="Actividad 1">Actividad 1</option>
                    <option value="Actividad 2">Actividad 2</option>
                    <option value="Actividad 3">Actividad 3</option>
                    <option value="Actividad 4">Actividad 4</option>
                    <option value="Opción X">Opción X</option>
                    <option value="Opción Y">Opción Y</option>
                </select>
            </div>

            <div class="form-group">
                <label>Número de Ticket Generado:</label>
                <div id="folioDisplay" class="folio-box">Seleccione una solicitud...</div>
            </div>

            <div class="form-group">
                <label>Adjuntar Documento (PDF, DOC, XLS):</label>
                <label for="file-upload" class="custom-file-upload">
                    Seleccionar Archivo
                </label>
                <input id="file-upload" type="file" accept=".pdf, .doc, .docx, .xls, .xlsx" onchange="alertaArchivo(this)">
                <span id="file-name">Ningún archivo seleccionado</span>
            </div>

            <div class="form-group">
                <label for="comentarios_user">Comentarios / Descripción Adicional:</label>
                <textarea id="comentarios_user" rows="4" placeholder="Escriba aquí los detalles de su solicitud..."></textarea>
            </div>

            <div class="btn-container">
                <a href="index.html" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-enviar">Enviar Ticket</button>
            </div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitud";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let folioGeneradoGlobal = "";

        function alertaArchivo(input) {
            const fileNameSpan = document.getElementById('file-name');
            if (input.files.length > 0) {
                fileNameSpan.textContent = input.files[0].name;
                alert("Por favor, verifique su archivo adjunto antes de continuar. Al hacer clic en 'Aceptar', se generará automáticamente un ticket de servicio. Si detecta algún error y necesita modificar el archivo después de enviar, tendrá que generar un nuevo ticket de servicio que será enviado a la fila virtual para su atención.");
            } else {
                fileNameSpan.textContent = "Ningún archivo seleccionado";
            }
        }

        // LÓGICA DE FOLIOS CORREGIDA: Identifica de forma única cada servicio/actividad
        function obtenerIdentificadorContador(opcion) {
            switch(opcion) {
                case "Consulta": return "DCPL_A001";
                case "Análisis Hallazgo": return "DCPL_B001";
                case "Analisis de Pliego": return "DCPL_B002";
                case "Análisis de Informe": return "DCPL_B003";
                case "Denuncia": return "DCPL_C001";
                case "Tarjeta Informativa": return "DCPL_D001";
                case "Actividad 1": return "DINV_ACT1";
                case "Actividad 2": return "DINV_ACT2";
                case "Actividad 3": return "DSUB_ACT3";
                case "Actividad 4": return "DSUB_ACT4";
                default: return "DCPL_X000";
            }
        }

        function calcularFolio() {
            const opcion = document.getElementById('tipo_solicitud').value;
            const display = document.getElementById('folioDisplay');
            
            if(!opcion) return;

            let estructuraBase = "";
            let claveServicio = "";

            switch(opcion) {
                case "Consulta": 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "A001-"; break;
                case "Análisis Hallazgo": 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "B001-"; break;
                case "Analisis de Pliego": 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "B002-"; break;
                case "Análisis de Informe": 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "B003-"; break;
                case "Denuncia": 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "C001-"; break;
                case "Tarjeta Informativa": 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "D001-"; break;
                
                case "Actividad 1":
                case "Actividad 2":
                    estructuraBase = "JURIX-DGAJ-DINV-"; claveServicio = ""; break;
                
                case "Actividad 3":
                case "Actividad 4":
                    estructuraBase = "JURIX-DSUB-DCPL-"; claveServicio = ""; break;
                
                default: 
                    estructuraBase = "JURIX-DGAJ-DCPL-"; claveServicio = "X000-"; break;
            }

            // Conseguir la clave de almacenamiento específica de esta solicitud individual
            const idContador = obtenerIdentificadorContador(opcion);
            let numActual = localStorage.getItem(`consecutivo_${idContador}`) || 1;
            let numFormateado = String(numActual).padStart(4, '0');

            folioGeneradoGlobal = `${estructuraBase}${claveServicio}${numFormateado}`;
            display.textContent = folioGeneradoGlobal;
        }

        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!folioGeneradoGlobal) {
                alert("Por favor, seleccione un tipo de solicitud válido para generar su folio.");
                return;
            }

            const nombre_user = document.getElementById('nombre_user').value;
            const puesto_user = document.getElementById('puesto_user').value;
            const area_user = document.getElementById('area_user').value;
            const tipo_solicitud = document.getElementById('tipo_solicitud').value;
            const comentarios_user = document.getElementById('comentarios_user').value;

            const data = {
                nombre_user: nombre_user,
                puesto_user: puesto_user,
                area_user: area_user,
                tipo_solicitud: tipo_solicitud,
                folio_user: folioGeneradoGlobal,
                comentarios_user: comentarios_user
            };

            try {
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert(`¡Ticket generado con éxito!\nSu folio oficial es: ${folioGeneradoGlobal}\nSu solicitud ha sido enviada a la fila virtual.`);
                    
                    // Incrementa de manera única el contador de esta solicitud específica
                    actualizarContadorLocal(tipo_solicitud);
                    redireccionarPagina(tipo_solicitud);
                } else {
                    const errorData = await response.json();
                    console.error("Detalles del error en Supabase:", errorData);
                    alert("Error al guardar en Supabase. Asegúrese de que las columnas coincidan exactamente en la base de datos.");
                }

            } catch (error) {
                console.error("Error de red:", error);
                alert("No se pudo establecer conexión con la base de datos.");
            }
        });

        // Modificado para guardar usando el id único por servicio
        function actualizarContadorLocal(opcion) {
            const idContador = obtenerIdentificadorContador(opcion);
            let numActual = parseInt(localStorage.getItem(`consecutivo_${idContador}`)) || 1;
            localStorage.setItem(`consecutivo_${idContador}`, numActual + 1);
        }

        function redireccionarPagina(solicitud) {
            switch(solicitud) {
                case "Consulta": window.location.href = "CONSULTA.HTML"; break;
                case "Análisis Hallazgo": window.location.href = "HALLAZGO.HTML"; break;
                case "Analisis de Pliego": window.location.href = "PLIEGO.HTML"; break;
                case "Análisis de Informe": window.location.href = "INFORME.HTML"; break;
                case "Denuncia": window.location.href = "DENUNCIA.HTML"; break;
                case "Tarjeta Informativa": window.location.href = "TARJETAINFO.HTML"; break;
                case "Actividad 1": window.location.href = "ACT1.HTML"; break;
                default: window.location.href = "index.html"; break;
            }
        }
    </script>
</body>
</html>
