<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Nueva Solicitud</title>
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #333333;
            --gris-claro: #f4f4f9;
            --blanco: #ffffff;
            --azul-info: #0066cc;
            --input-bloqueado: #eaeded;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            color: var(--gris-oscuro);
        }

        header {
            background-color: var(--blanco);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--naranja-nitido);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav {
            background-color: var(--gris-oscuro);
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--naranja-nitido);
        }

        .container {
            max-width: 750px;
            margin: 30px auto;
            background: var(--blanco);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--gris-oscuro);
            margin-bottom: 5px;
            font-size: 1.6rem;
        }

        .subtitle-folio {
            text-align: center;
            color: var(--azul-info);
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #eef7ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 25px;
            border: 1px dashed var(--azul-info);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--naranja-nitido);
            outline: none;
            box-shadow: 0 0 5px rgba(255, 102, 0, 0.2);
        }

        /* Estilo para campos bloqueados de sesión o calculados */
        input[readonly] {
            background-color: var(--input-bloqueado);
            color: #7f8c8d;
            cursor: not-allowed;
            font-weight: 500;
        }

        .section-divider {
            grid-column: span 2;
            border-top: 1px dashed #ccc;
            margin: 15px 0;
            padding-top: 15px;
            color: var(--naranja-nitido);
            font-weight: bold;
            font-size: 1rem;
        }

        /* --- BOTONERA --- */
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
        }

        button, .btn-cancelar {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
        }

        .btn-enviar {
            background-color: var(--naranja-nitido);
            color: var(--blanco);
            box-shadow: 0 3px 6px rgba(255,102,0,0.2);
        }

        .btn-enviar:hover {
            background-color: #e05500;
            transform: translateY(-1px);
        }

        .btn-cancelar {
            background-color: #999999;
            color: var(--blanco);
        }

        .btn-cancelar:hover {
            background-color: #777777;
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ</h1>
    </header>

    <nav>
        <a href="solicitud.html">Nueva Solicitud</a>
        <a href="hallazgos.html">Cédula de Hallazgos</a>
        <a href="index.html">Salir</a>
    </nav>

    <div class="container">
        <h2>Formulario de Nueva Solicitud de Trámite</h2>
        <div id="folioTicketPrevisualizacion" class="subtitle-folio">Seleccione un Servicio para Generar Folio...</div>
        
        <form id="solicitudForm">
            <div class="form-grid">
                
                <div class="section-divider">👤 Datos del Servidor Público (Sesión Activa)</div>

                <div class="form-group full-width">
                    <label for="user_nombre">Nombre Completo:</label>
                    <input type="text" id="user_nombre" readonly required>
                </div>

                <div class="form-group">
                    <label for="user_puesto">Puesto:</label>
                    <input type="text" id="user_puesto" readonly required>
                </div>

                <div class="form-group">
                    <label for="user_area">Área Adscripción:</label>
                    <input type="text" id="user_area" readonly required>
                </div>

                <div class="section-divider">📋 Detalles del Trámite o Ticket</div>

                <div class="form-group">
                    <label for="servicio_solicitado">Servicio / Tipo de Trámite:</label>
                    <select id="servicio_solicitado" required>
                        <option value="" disabled selected>-- Seleccione Servicio --</option>
                        <option value="DCPL_A001">DCPL-A001 | Consulta Jurídica</option>
                        <option value="DCPL_B001">DCPL-B001 | Análisis de Hallazgo de Auditoría</option>
                        <option value="DCPL_B002">DCPL-B002 | Análisis de Pliego de Observaciones</option>
                        <option value="DCPL_B003">DCPL-B003 | Análisis de Informe de Presunta Responsabilidad</option>
                        <option value="DCPL_C001">DCPL-C001 | Formulación de Denuncia</option>
                        <option value="DCPL_D001">DCPL-D001 | Emisión de Tarjeta Informativa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="folio_calculado">Número de Ticket Interno (Folio):</label>
                    <input type="text" id="folio_calculado" readonly placeholder="Se generará automáticamente" required>
                </div>

                <div class="form-group">
                    <label for="prioridad_tramite">Prioridad del Trámite:</label>
                    <select id="prioridad_tramite" required>
                        <option value="Normal" selected>Normal</option>
                        <option value="Urgente">⚠️ Urgente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha_registro">Fecha de Registro:</label>
                    <input type="text" id="fecha_registro" readonly required>
                </div>

                <div class="form-group full-width">
                    <label for="asunto_solicitud">Asunto / Descripción Corta:</label>
                    <textarea id="asunto_solicitud" rows="3" required placeholder="Describa brevemente el objetivo o motivo de esta solicitud..."></textarea>
                </div>
            </div>

            <div class="btn-container">
                <a href="index.html" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-enviar">Registrar Ticket e Ir a Cédula</button>
            </div>
        </form>
    </div>

    <script>
        const SUPABASE_SOLICITUDES_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitudes";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        window.addEventListener('DOMContentLoaded', () => {
            // 1. FILTRO DE SEGURIDAD INTERCONECTADO
            if (localStorage.getItem('jurix_sesion_activa') !== 'true') {
                alert("Acceso denegado. Por favor, inicie sesión primero en el index.");
                window.location.href = "index.html";
                return;
            }

            // 2. EXTRAER Y FIJAR VALORES POR DEFAULT DE LA SESIÓN ACTIVA
            document.getElementById('user_nombre').value = localStorage.getItem('last_user_name') || "No detectado";
            document.getElementById('user_puesto').value = localStorage.getItem('last_user_puesto') || "No detectado";
            document.getElementById('user_area').value = localStorage.getItem('last_user_area') || "No detectado";

            // 3. ESTABLECER FECHA DE HOY EN PANTALLA
            const hoy = new Date();
            const opcionesFecha = { year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('fecha_registro').value = hoy.toLocaleDateString('es-MX', opcionesFecha);
        });

        // 4. FUNCIONALIDAD DEL NÚMERO DE TICKET DINÁMICO EN TIEMPO REAL
        document.getElementById('servicio_solicitado').addEventListener('change', function() {
            const servicio = this.value;
            if (!servicio) return;

            // Leer el consecutivo guardado o inicializarlo en 1
            let valorConsecutivo = localStorage.getItem(`consecutivo_${servicio}`);
            let numActual = valorConsecutivo ? parseInt(valorConsecutivo) : 1;

            // Formatear a 4 dígitos fijos (Ej. 0001)
            const numFormateado = String(numActual).padStart(4, '0');
            const prefijoTicket = servicio.replace('_', '-'); 
            const ticketFinal = `JURIX-DGAJ-${prefijoTicket}-${numFormateado}`;

            // Actualizar tanto el Input oculto/bloqueado como el Banner Superior Informativo
            document.getElementById('folio_calculado').value = ticketFinal;
            document.getElementById('folioTicketPrevisualizacion').textContent = `Ticket Asignado: ${ticketFinal}`;
        });

        // 5. ENVÍO DE DATOS A SUPABASE E INCREMENTO DEL CONSECUTIVO
        document.getElementById('solicitudForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const servicio = document.getElementById('servicio_solicitado').value;
            const folioGenerado = document.getElementById('folio_calculado').value;

            // Obtener el consecutivo para incrementarlo de forma definitiva tras presionar el submit
            let valorConsecutivo = localStorage.getItem(`consecutivo_${servicio}`);
            let numActual = valorConsecutivo ? parseInt(valorConsecutivo) : 1;

            const dataSolicitud = {
                folio_ticket: folioGenerado,
                nombre_solicitante: document.getElementById('user_nombre').value,
                puesto_solicitante: document.getElementById('user_puesto').value,
                area_solicitante: document.getElementById('user_area').value,
                servicio: servicio,
                prioridad: document.getElementById('prioridad_tramite').value,
                asunto: document.getElementById('asunto_solicitud').value.trim(),
                fecha_creacion: new Date().toISOString()
            };

            try {
                const response = await fetch(SUPABASE_SOLICITUDES_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(dataSolicitud)
                });

                if (response.ok) {
                    // ÉXITO: Guardamos el incremento correlativo para el siguiente ticket en el LocalStorage
                    localStorage.setItem(`consecutivo_${servicio}`, numActual + 1);

                    alert(`¡Ticket Registrado con Éxito!\nFolio Oficial: ${folioGenerado}`);
                    
                    // Redirección condicionada al flujo del Grupo B (Hallazgos, Pliegos, Informes)
                    if(servicio.includes('_B001') || servicio.includes('_B002') || servicio.includes('_B003')) {
                        window.location.href = "hallazgos.html";
                    } else {
                        window.location.href = "estatus.html";
                    }
                } else {
                    const err = await response.json();
                    console.error(err);
                    alert("Error en la respuesta del servidor de base de datos.");
                }
            } catch (error) {
                console.error("Error de red:", error);
                alert("Fallo crítico de conexión con la API de Supabase.");
            }
        });
    </script>
</body>
</html>
