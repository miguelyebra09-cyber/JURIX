<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Registro de Ticket</title>
    <style>
        :root {
            --naranja-nitido: #FF5500;
            --gris-oscuro: #2D3748;
            --gris-claro: #F7FAFC;
            --borde: #E2E8F0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            color: var(--gris-oscuro);
        }

        /* Navegación */
        nav {
            background-color: var(--gris-oscuro);
            padding: 1rem 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: var(--naranja-nitido);
        }

        /* Encabezado */
        header {
            text-align: center;
            padding: 2rem 0 1rem 0;
        }

        header h1 {
            color: var(--naranja-nitido);
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* Contenedor del Formulario */
        .container {
            max-width: 650px;
            margin: 2rem auto;
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--naranja-nitido);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--borde);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .folio-display {
            background-color: #EDF2F7;
            padding: 0.75rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: #2B6CB0;
            border: 1px dashed #CBD5E0;
        }

        /* Botones */
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }

        button, .btn-cancelar {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-enviar {
            background-color: var(--naranja-nitido);
            color: white;
            border: none;
            flex: 2;
        }

        .btn-enviar:hover {
            background-color: #E04A00;
        }

        .btn-cancelar {
            background-color: #E2E8F0;
            color: var(--gris-oscuro);
            border: 1px solid #CBD5E0;
            flex: 1;
        }

        .btn-cancelar:hover {
            background-color: #CBD5E0;
        }

        input[type="file"] {
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="xxx.html">Opción 1</a>
        <a href="index.html">Salir</a>
    </nav>

    <header>
        <h1>JURIX-DGAJ</h1>
    </header>

    <div class="container">
        <form id="ticketForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label for="puesto">Puesto:</label>
                <input type="text" id="puesto" required>
            </div>

            <div class="form-group">
                <label for="area">Área:</label>
                <input type="text" id="area" required>
            </div>

            <div class="form-group">
                <label for="solicitud">Tipo de Solicitud:</label>
                <select id="solicitud" required onchange="generarFolio()">
                    <option value="" disabled selected>-- Seleccione una opción --</option>
                    <option value="Consulta">Consulta</option>
                    <option value="Análisis Hallazgo">Análisis Hallazgo</option>
                    <option value="Analisis de Pliego">Analisis de Pliego</option>
                    <option value="Análisis de Informe">Análisis de Informe</option>
                    <option value="Denuncia">Denuncia</option>
                    <option value="Tarjeta Informativa">Tarjeta Informativa</option>
                    <option value="Actividad 1">Actividad 1</option>
                    <option value="Actividad 2">Actividad 2</option>
                    <option value="Actividad 3">Actividad 3</option>
                    <option value="Actividad 4">Actividad 4</option>
                    <option value="Opción X">Opción X</option>
                    <option value="Opción Y">Opción Y</option>
                </select>
            </div>

            <div class="form-group">
                <label>Número de Ticket (Folio Autogenerado):</label>
                <div id="folioTicket" class="folio-display">Seleccione una solicitud...</div>
            </div>

            <div class="form-group">
                <label for="archivo">Adjuntar Archivo (PDF, DOC, XLS):</label>
                <input type="file" id="archivo" accept=".pdf, .doc, .docx, .xls, .xlsx" onchange="alertaArchivo()">
            </div>

            <div class="form-group">
                <label for="comentarios">Comentarios Adicionales:</label>
                <textarea id="comentarios" placeholder="Escriba aquí sus observaciones..."></textarea>
            </div>

            <div class="btn-group">
                <a href="index.html" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-enviar">Enviar Ticket</button>
            </div>
        </form>
    </div>

    <script>
        // Configuración de las credenciales de Supabase proporcionadas
        const SUPABASE_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitud";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        // Variable global para almacenar el folio actual calculado
        let folioActual = "";

        // Función para calcular y mostrar el folio dinámico y consecutivo
        function generarFolio() {
            const solicitud = document.getElementById('solicitud').value;
            let prefijo = "";
            let claveControl = ""; // Llave interna para el consecutivo en localStorage

            // Grupo 1: DCPL Estándar
            const grupoDCPL = ["Consulta", "Análisis Hallazgo", "Analisis de Pliego", "Análisis de Informe", "Denuncia", "Tarjeta Informativa", "Opción X", "Opción Y"];
            
            if (grupoDCPL.includes(solicitud)) {
                prefijo = "JURIX-DGAJ-DCPL-";
                claveControl = "DCPL_G1";
            } 
            // Grupo 2: DINV (Actividad 1 y 2)
            else if (solicitud === "Actividad 1" || solicitud === "Actividad 2") {
                prefijo = "JURIX-DGAJ-DINV-";
                claveControl = "DINV_G2";
            } 
            // Grupo 3: DSUB-DCPL (Actividad 3 y 4)
            else if (solicitud === "Actividad 3" || solicitud === "Actividad 4") {
                prefijo = "JURIX-DSUB-DCPL-";
                claveControl = "DCPL_G3";
            }

            if (prefijo !== "") {
                // Obtener el consecutivo actual guardado o empezar en 1
                let consecutivo = localStorage.getItem(claveControl);
                if (!consecutivo) {
                    consecutivo = 1;
                } else {
                    consecutivo = parseInt(consecutivo);
                }

                // Formatear a 4 dígitos (ej. 0001)
                let numeroFormateado = String(consecutivo).padStart(4, '0');
                folioActual = prefijo + numeroFormateado;
                
                document.getElementById('folioTicket').innerText = folioActual;
                // Guardamos de manera temporal la clave para actualizarla solo si se envía con éxito
                document.getElementById('ticketForm').dataset.claveControl = claveControl;
                document.getElementById('ticketForm').dataset.consecutivoActual = consecutivo;
            }
        }

        // Alerta requerida cuando el usuario sube un documento
        function alertaArchivo() {
            const archivoInput = document.getElementById('archivo');
            if (archivoInput.files.length > 0) {
                alert("Revise su archivo adjunto antes de aceptar. Una vez enviado, se creará un ticket de servicio. Si necesita realizar cambios posteriores, deberá generar un nuevo ticket que entrará a la fila virtual de atención.");
            }
        }

        // Manejo del envío del formulario e integración con Supabase
        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const solicitudSeleccionada = document.getElementById('solicitud').value;

            // Datos estructurados para enviar a la tabla 'solicitud' de Supabase
            const datosTicket = {
                nombre: document.getElementById('nombre').value,
                puesto: document.getElementById('puesto').value,
                area: document.getElementById('area').value,
                solicitud: solicitudSeleccionada,
                folio: folioActual,
                comentarios: document.getElementById('comentarios').value
            };

            try {
                // Petición HTTP POST a la REST API de Supabase
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(datosTicket)
                });

                if (response.ok) {
                    // Si se guardó con éxito, aumentamos el consecutivo correspondiente en el localStorage
                    const clave = this.dataset.claveControl;
                    const proxConsecutivo = parseInt(this.dataset.consecutivoActual) + 1;
                    localStorage.setItem(clave, proxConsecutivo);

                    alert("¡Ticket creado con éxito! Folio asignado: " + folioActual);
                    
                    // Ejecutar el redireccionamiento condicional solicitado
                    redireccionarPagina(solicitudSeleccionada);
                } else {
                    const errorData = await response.json();
                    alert("Error al conectar con Supabase: " + (errorData.message || response.statusText));
                }
            } catch (error) {
                console.error("Error en la solicitud:", error);
                alert("Hubo un problema de red al intentar conectar con Supabase.");
            }
        });

        // Función encargada de bifurcar el destino final según la opción seleccionada
        function redireccionarPagina(solicitud) {
            switch(solicitud) {
                case "Consulta":
                    window.location.href = "CONSULTA.HTML";
                    break;
                case "Análisis Hallazgo":
                    window.location.href = "HALLAZGO.HTML";
                    break;
                case "Analisis de Pliego":
                    window.location.href = "PLIEGO.HTML";
                    break;
                case "Análisis de Informe":
                    window.location.href = "INFORME.HTML";
                    break;
                case "Denuncia":
                    window.location.href = "DENUNCIA.HTML";
                    break;
                case "Tarjeta Informativa":
                    window.location.href = "TARJETAINFO.HTML";
                    break;
                case "Actividad 1":
                    window.location.href = "ACT1.HTML";
                    break;
                default:
                    // Si es otra opción no especificada (como Actividad 2, 3, 4, X o Y), regresa al index
                    window.location.href = "index.html";
                    break;
            }
        }
    </script>
</body>
</html>
