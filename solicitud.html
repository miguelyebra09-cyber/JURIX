<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Generador de Tickets</title>
    <style>
        :root {
            --naranja-nitido: #FF6600;
            --gris-oscuro: #333333;
            --gris-claro: #f4f4f9;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 0;
            color: var(--gris-oscuro);
        }

        /* Encabezado y Título */
        header {
            background-color: var(--blanco);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--naranja-nitido);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--naranja-nitido);
            margin: 0;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Menú de Navegación */
        nav {
            background-color: var(--gris-oscuro);
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--naranja-nitido);
        }

        /* Contenedor del Formulario */
        .container {
            max-width: 650px;
            margin: 30px auto;
            background: var(--blanco);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--gris-oscuro);
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        /* Estilos de Formulario */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--naranja-nitido);
            outline: none;
        }

        /* Vista previa del Folio */
        .folio-box {
            background-color: #eef7ff;
            border-left: 5px solid #0066cc;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #0044cc;
        }

        /* Botones */
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button, .btn-cancelar {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: background 0.3s;
        }

        .btn-enviar {
            background-color: var(--naranja-nitido);
            color: var(--blanco);
        }

        .btn-enviar:hover {
            background-color: #e05500;
        }

        .btn-cancelar {
            background-color: #999999;
            color: var(--blanco);
        }

        .btn-cancelar:hover {
            background-color: #777777;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 10px 20px;
            background-color: #e1e1e1;
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #ccc;
        }

        .custom-file-upload:hover {
            background-color: #d2d2d2;
        }

        #file-name {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ</h1>
    </header>

    <nav>
        <a href="xxx.html">Opción 1</a>
        <a href="index.html">Salir</a>
    </nav>

    <div class="container">
        <h2>Ticket de Servicio - Área Jurídica</h2>
        
        <form id="ticketForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="puesto">Puesto:</label>
                <input type="text" id="puesto" required placeholder="Ej. Analista Jurídico">
            </div>

            <div class="form-group">
                <label for="area">Área:</label>
                <input type="text" id="area" required placeholder="Ej. Dirección de lo Contencioso">
            </div>

            <div class="form-group">
                <label for="solicitud">Tipo de Solicitud:</label>
                <select id="solicitud" required onchange="calcularFolio()">
                    <option value="" disabled selected>-- Seleccione una opción --</option>
                    <option value="Consulta">Consulta</option>
                    <option value="Análisis Hallazgo">Análisis Hallazgo</option>
                    <option value="Analisis de Pliego">Analisis de Pliego</option>
                    <option value="Análisis de Informe">Análisis de Informe</option>
                    <option value="Denuncia">Denuncia</option>
                    <option value="Tarjeta Informativa">Tarjeta Informativa</option>
                    <option value="Actividad 1">Actividad 1</option>
                    <option value="Actividad 2">Actividad 2</option>
                    <option value="Actividad 3">Actividad 3</option>
                    <option value="Actividad 4">Actividad 4</option>
                    <option value="Opción X">Opción X</option>
                    <option value="Opción Y">Opción Y</option>
                </select>
            </div>

            <div class="form-group">
                <label>Número de Ticket Estimado:</label>
                <div id="folioDisplay" class="folio-box">Seleccione una solicitud...</div>
            </div>

            <div class="form-group">
                <label>Adjuntar Documento (PDF, DOC, XLS):</label>
                <label for="file-upload" class="custom-file-upload">
                    Seleccionar Archivo
                </label>
                <input id="file-upload" type="file" accept=".pdf, .doc, .docx, .xls, .xlsx" onchange="alertaArchivo(this)">
                <span id="file-name">Ningún archivo seleccionado</span>
            </div>

            <div class="form-group">
                <label for="comentarios">Comentarios / Descripción Adicional:</label>
                <textarea id="comentarios" rows="4" placeholder="Escriba aquí los detalles de su solicitud..."></textarea>
            </div>

            <div class="btn-container">
                <a href="index.html" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-enviar">Enviar Ticket</button>
            </div>
        </form>
    </div>

    <script>
        // Configuración de Supabase proporcionada
        const SUPABASE_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitud";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let folioGenerado Global = "";

        // Alerta al subir el documento solicitado
        function alertaArchivo(input) {
            const fileNameSpan = document.getElementById('file-name');
            if (input.files.length > 0) {
                fileNameSpan.textContent = input.files[0].name;
                alert("Revise su archivo adjunto antes de aceptar. Una vez enviado, se creará un ticket de servicio. Si necesita realizar cambios posteriores, deberá generar un nuevo ticket que entrará a la fila virtual de atención.");
            } else {
                fileNameSpan.textContent = "Ningún archivo seleccionado";
            }
        }

        // Lógica de cálculo de la máscara y folios consecituvos por tipo
        function calcularFolio() {
            const opcion = document.getElementById('solicitud').value;
            const display = document.getElementById('folioDisplay');
            
            if(!opcion) return;

            let mascara = "";
            let clave = "";
            let tipoConsecutivo = ""; // Identificador para separar los folios en localStorage

            // Mapeo de reglas solicitadas
            switch(opcion) {
                case "Consulta": 
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "A001"; tipoConsecutivo = "DCPL"; break;
                case "Análisis Hallazgo": 
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "B001"; tipoConsecutivo = "DCPL"; break;
                case "Analisis de Pliego": 
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "B002"; tipoConsecutivo = "DCPL"; break;
                case "Análisis de Informe": 
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "B003"; tipoConsecutivo = "DCPL"; break;
                case "Denuncia": 
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "C001"; tipoConsecutivo = "DCPL"; break;
                case "Tarjeta Informativa": 
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "D001"; tipoConsecutivo = "DCPL"; break;
                
                case "Actividad 1":
                case "Actividad 2":
                    mascara = "JURIX-DGAJ-DINV-"; clave = ""; tipoConsecutivo = "DINV"; break;
                
                case "Actividad 3":
                case "Actividad 4":
                    mascara = "JURIX-DSUB-DCPL-"; clave = ""; tipoConsecutivo = "DSUB"; break;
                
                // Opciones por defecto para X e Y en caso de no estar especificadas
                default:
                    mascara = "JURIX-DGAJ-DCPL-"; clave = "X000"; tipoConsecutivo = "DEFAULT"; break;
            }

            // Obtener el número consecutivo actual guardado en el navegador para esa dirección
            let numActual = localStorage.getItem(`consecutivo_${tipoConsecutivo}`) || 1;
            // Rellenar con ceros a la izquierda (4 dígitos) Ej: 0001
            let numFormateado = String(numActual).padStart(4, '0');

            // Armar el folio final completo
            folioGeneradoGlobal = `${mascara}${clave}${numFormateado}`;
            display.textContent = folioGeneradoGlobal;
        }

        // Manejo del Envío del Formulario
        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Captura de datos
            const nombre = document.getElementById('nombre').value;
            const puesto = document.getElementById('puesto').value;
            const area = document.getElementById('area').value;
            const solicitud = document.getElementById('solicitud').value;
            const comentarios = document.getElementById('comentarios').value;

            // JSON con la estructura para la tabla 'solicitud' de Supabase
            const data = {
                nombre: nombre,
                puesto: puesto,
                area: area,
                solicitud: solicitud,
                folio: folioGeneradoGlobal,
                comentarios: comentarios
            };

            try {
                // Envío de datos a Supabase utilizando Fetch API
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert(`¡Ticket generado con éxito!\nSu folio es: ${folioGeneradoGlobal}`);
                    
                    // Aumentar el consecutivo local únicamente si la inserción fue exitosa
                    actualizarConsecutivoLocal(solicitud);

                    // Redirección condicional según la solicitud seleccionada
                    redireccionarPagina(solicitud);
                } else {
                    const errorData = await response.json();
                    console.error(errorData);
                    alert("Hubo un error al conectar con Supabase. Verifique los campos de su tabla.");
                }

            } catch (error) {
                console.error("Error de red:", error);
                alert("No se pudo conectar a la base de datos. Verifique su conexión de red.");
            }
        });

        // Función para avanzar el contador del consecutivo
        function actualizarConsecutivoLocal(opcion) {
            let tipoConsecutivo = "DEFAULT";
            if (["Consulta", "Análisis Hallazgo", "Analisis de Pliego", "Análisis de Informe", "Denuncia", "Tarjeta Informativa"].includes(opcion)) {
                tipoConsecutivo = "DCPL";
            } else if (["Actividad 1", "Actividad 2"].includes(opcion)) {
                tipoConsecutivo = "DINV";
            } else if (["Actividad 3", "Actividad 4"].includes(opcion)) {
                tipoConsecutivo = "DSUB";
            }

            let numActual = parseInt(localStorage.getItem(`consecutivo_${tipoConsecutivo}`)) || 1;
            localStorage.setItem(`consecutivo_${tipoConsecutivo}`, numActual + 1);
        }

        // Sistema de redirección dinámico solicitado
        function redireccionarPagina(solicitud) {
            switch(solicitud) {
                case "Consulta": window.location.href = "CONSULTA.HTML"; break;
                case "Análisis Hallazgo": window.location.href = "HALLAZGO.HTML"; break;
                case "Analisis de Pliego": window.location.href = "PLIEGO.HTML"; break;
                case "Análisis de Informe": window.location.href = "INFORME.HTML"; break;
                case "Denuncia": window.location.href = "DENUNCIA.HTML"; break;
                case "Tarjeta Informativa": window.location.href = "TARJETAINFO.HTML"; break;
                case "Actividad 1": window.location.href = "ACT1.HTML"; break;
                default: window.location.href = "index.html"; break;
            }
        }
    </script>
</body>
</html>
