<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIX-DGAJ - Fila Virtual Automatizada</title>
    <style>
        :root {
            --naranja-principal: #FF6600;
            --naranja-hover: #E05500;
            --gris-oscuro: #2C3E50;
            --gris-fondo: #F8F9FA;
            --blanco: #FFFFFF;
            --azul-info: #2980B9;
            --verde-exito: #27AE60;
            --rojo-alerta: #C0392B;
            --borde-radio: 12px;
            --sombra: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* --- ENCABEZADO Y NAVEGACIÓN --- */
        header {
            background-color: var(--blanco);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--naranja-principal);
            box-shadow: var(--sombra);
        }

        h1 {
            color: var(--naranja-principal);
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        nav {
            background-color: var(--gris-oscuro);
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        nav a {
            color: var(--blanco);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--naranja-principal);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* --- BARRA DE CONTROL DE PERFIL --- */
        .profile-bar {
            background: var(--blanco);
            padding: 18px 25px;
            border-radius: var(--borde-radio);
            box-shadow: var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-left: 6px solid var(--azul-info);
        }

        .user-meta span {
            margin-right: 20px;
            font-size: 1rem;
        }

        .user-meta strong {
            color: var(--gris-oscuro);
        }

        .role-badge {
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .badge-usuario { background: #EBF5FB; color: var(--azul-info); }
        .badge-supervisor { background: #FEF9E7; color: #D4AC0D; }
        .badge-administrador { background: #FDEDEC; color: var(--rojo-alerta); }

        /* --- PANEL DE SOLICITUDES DE PRÓRROGA (SOLO ADMIN) --- */
        #panel-alertas-admin {
            display: none;
            background: #FDEDEC;
            border: 1px solid #FADBD8;
            border-radius: var(--borde-radio);
            padding: 20px;
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease;
        }

        /* --- FILTROS MULTIVARIABLES (SUPERVISOR / ADMIN) --- */
        .filter-section {
            display: none;
            background: var(--blanco);
            padding: 25px;
            border-radius: var(--borde-radio);
            box-shadow: var(--sombra);
            margin-bottom: 30px;
        }

        .filter-section h3 {
            margin-top: 0;
            color: var(--gris-oscuro);
            font-size: 1.15rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #555;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9rem;
            background-color: #FFF;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--naranja-principal);
        }

        /* --- TARJETAS VISTOSAS DE TICKETS --- */
        .ticket-card {
            background: var(--blanco);
            border-radius: var(--borde-radio);
            box-shadow: var(--sombra);
            padding: 25px;
            margin-bottom: 25px;
            border-top: 4px solid var(--naranja-principal);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .ticket-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .ticket-id {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--naranja-principal);
        }

        .ticket-status {
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pendiente { background-color: #FEF5E7; color: #E67E22; }
        .status-enrevisión { background-color: #EBF5FB; color: var(--azul-info); }
        .status-completado { background-color: #EAF2F8; color: var(--verde-exito); }

        .ticket-body-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 25px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .ticket-body-grid { grid-template-columns: 1fr; }
        }

        .info-meta p {
            margin: 8px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* --- REPRESENTACIÓN DE FILA VIRTUAL (LÍNEA DE TIEMPO) --- */
        .timeline-container {
            background: #F8FAFC;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #E2E8F0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .timeline-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748B;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 10px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #E2E8F0;
            z-index: 1;
        }

        .timeline-step {
            text-align: center;
            position: relative;
            z-index: 2;
            flex: 1;
        }

        .timeline-node {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #94A3B8;
            color: #FFF;
            line-height: 32px;
            margin: 0 auto 10px auto;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 0 0 4px var(--blanco);
            transition: all 0.3s ease;
        }

        .timeline-step.completed .timeline-node {
            background: var(--verde-exito);
        }

        .timeline-step.active .timeline-node {
            background: var(--naranja-principal);
            box-shadow: 0 0 0 4px var(--blanco), 0 0 12px rgba(255, 102, 0, 0.4);
        }

        .timeline-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748B;
        }

        .timeline-step.active .timeline-label {
            color: var(--naranja-principal);
            font-weight: 700;
        }

        /* --- ZONAS DE ACCIONES --- */
        .action-zone {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid #E2E8F0;
            padding-top: 15px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 10px 18px;
            font-size: 0.85rem;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-action:active { transform: scale(0.98); }
        .btn-prorrogas { background: var(--gris-oscuro); color: var(--blanco); }
        .btn-prorrogas:hover { background: #1A252F; }
        .btn-edit { background: var(--azul-info); color: var(--blanco); }
        .btn-edit:hover { background: #1F618D; }
        .btn-success-panel { background: var(--verde-exito); color: var(--blanco); }

        .alert-item {
            background: var(--blanco);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 5px solid var(--rojo-alerta);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>JURIX-DGAJ - Fila Virtual de Turnos</h1>
    </header>

    <nav>
        <a href="solicitud.html">Nueva Solicitud</a>
        <a href="hallazgo.html">Cédula de Hallazgos</a>
        <a href="estatus.html">Estatus / Fila Virtual</a>
        <a href="index.html">Salir del Sistema</a>
    </nav>

    <div class="container">
        
        <div class="profile-bar">
            <div class="user-meta">
                <span>Bienvenido(a): <strong id="lbl-nombre-sesion">Cargando...</strong></span>
                <span>Área: <strong id="lbl-area-sesion">...</strong></span>
            </div>
            <div id="badge-rol-contenedor" class="role-badge">Validando...</div>
        </div>

        <div id="panel-alertas-admin">
            <h3 style="color: var(--rojo-alerta); margin-top: 0; display: flex; align-items: center; gap: 8px;">
                🚨 Alertas de Control: Solicitudes de Prórroga por Validar
            </h3>
            <div id="lista-alertas-prorrogas"></div>
        </div>

        <div id="seccion-filtros" class="filter-section">
            <h3>🔍 Consola de Inteligencia y Búsqueda de Tickets</h3>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Filtrar por Auditor / Usuario:</label>
                    <input type="text" id="filtro-usuario" placeholder="Ej: Arturo Vidal">
                </div>
                <div class="filter-group">
                    <label>Filtrar por Área / Dirección:</label>
                    <select id="filtro-area">
                        <option value="">-- Todas las Áreas --</option>
                        <option value="DGAJ">DGAJ</option>
                        <option value="DCPL">DCPL</option>
                        <option value="Auditoría">Auditoría Especial</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Filtrar por Ente Fiscalizado:</label>
                    <input type="text" id="filtro-ente" placeholder="Ej: Pueblo Nuevo">
                </div>
                <div class="filter-group">
                    <label>Filtrar por Fecha:</label>
                    <input type="date" id="filtro-fecha">
                </div>
                <div class="filter-group">
                    <label>Filtrar por Estatus:</label>
                    <select id="filtro-estatus">
                        <option value="">-- Todos los Estados --</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Revisión">En Revisión</option>
                        <option value="Completado">Completado</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="contenedor-tickets-maestro"></div>

    </div>

    <script>
        // CONFIGURACIÓN CENTRAL DE CONEXIÓN CON SUPABASE
        const URL_SOLICITUDES = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/solicitudes";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let userRole = "usuario"; 
        let currentUserName = "";

        // MANEJO DE INICIO DE SESIÓN, ROLES Y PRIVILEGIOS
        window.addEventListener('DOMContentLoaded', async () => {
            // Lectura limpia y genérica de la sesión activa
            currentUserName = localStorage.getItem('jurix_nombre_usuario') || localStorage.getItem('last_user_name') || "Invitado";
            const areaSesion = localStorage.getItem('jurix_area_usuario') || localStorage.getItem('last_user_area') || "DGAJ";
            const correoLogueado = (localStorage.getItem('last_user_email') || "").toLowerCase();
            
            // Lógica inteligente para asignación automática de perfiles
            if (correoLogueado.includes('admin')) {
                userRole = "administrador";
            } else if (correoLogueado.includes('supervisor') || currentUserName.includes('Director') || currentUserName.includes('Jefe')) {
                userRole = "supervisor";
            } else {
                userRole = "usuario"; 
            }

            // Inyección de textos en interfaz
            document.getElementById('lbl-nombre-sesion').textContent = currentUserName;
            document.getElementById('lbl-area-sesion').textContent = areaSesion;
            
            const badge = document.getElementById('badge-rol-contenedor');
            badge.textContent = `Perfil: ${userRole}`;
            badge.className = `role-badge badge-${userRole}`;

            // Adaptar los módulos visibles según el nivel del perfil
            configurarModulosPorPerfil();
            cargarTicketsFilaVirtual();
        });

        function configurarModulosPorPerfil() {
            if (userRole === "supervisor" || userRole === "administrador") {
                document.getElementById('seccion-filtros').style.display = "block";
                
                // Oyentes en tiempo real para los inputs de búsqueda
                document.getElementById('filtro-usuario').addEventListener('input', ejecutarAlgoritmoFiltrado);
                document.getElementById('filtro-area').addEventListener('change', ejecutarAlgoritmoFiltrado);
                document.getElementById('filtro-ente').addEventListener('input', ejecutarAlgoritmoFiltrado);
                document.getElementById('filtro-fecha').addEventListener('change', ejecutarAlgoritmoFiltrado);
                document.getElementById('filtro-estatus').addEventListener('change', ejecutarAlgoritmoFiltrado);
            }
            if (userRole === "administrador") {
                document.getElementById('panel-alertas-admin').style.display = "block";
                recuperarSolicitudesProrrogaLocal();
            }
        }

      // CONFIGURACIÓN CORREGIDA APUNTANDO A TU TABLA REAL (IMAGE_B4AC5B.PNG)
        const URL_SOLICITUDES = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/hallazgos";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        let userRole = "usuario"; 
        let currentUserName = "";

        // CONTROLADOR DE CONSULTAS VINCULADO A LA TABLA 'HALLAZGOS'
        async function cargarTicketsFilaVirtual() {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "<p style='text-align:center; color:#7F8C8D;'>Sincronizando Fila Virtual con la tabla Hallazgos...</p>";

            try {
                // Consultamos directamente tu tabla 'hallazgos' ordenando por su fecha de creación
                let endpointQuery = `${URL_SOLICITUDES}?select=*&order=created_at.desc`;
                
                const respuesta = await fetch(endpointQuery, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!respuesta.ok) throw new Error("Error al consultar la tabla hallazgos");
                const listaData = await respuesta.json();
                
                // FILTRADO INTELIGENTE POR TU COLUMNA 'usuario_nombre'
                let datosParaMostrar = [];

                if (userRole === "usuario") {
                    const nombreBuscado = currentUserName.toLowerCase().trim();
                    
                    datosParaMostrar = listaData.filter(ticket => {
                        // Leemos exactamente tu columna 'usuario_nombre' de Supabase
                        const solicitante = (ticket.usuario_nombre || "").toLowerCase().trim();
                        return solicitante.includes(nombreBuscado) || nombreBuscado.includes(solicitante);
                    });
                } else {
                    datosParaMostrar = listaData;
                }

                window.cacheFilaVirtual = datosParaMostrar; 
                renderizarTicketsInterfaz(datosParaMostrar);

            } catch (err) {
                console.error("Fallo de red o estructura:", err);
                contenedor.innerHTML = "<p style='color:var(--rojo-alerta); text-align:center;'>⚠️ Error de sincronización con la tabla Hallazgos.</p>";
            }
        }

        // MOTOR DE RENDERIZADO ADAPTADO A TUS COLUMNAS REALES
        function renderizarTicketsInterfaz(tickets) {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "";

            if (tickets.length === 0) {
                contenedor.innerHTML = "<p style='text-align:center; color:#95A5A6; padding:40px; background:white; border-radius:10px;'>No se encontraron tickets registrados en la tabla hallazgos para tu usuario.</p>";
                return;
            }

            tickets.forEach((item, indice) => {
                // Mapeamos las columnas reales que se ven en tu imagen image_b4ac5b.png
                const folio = item.folio_user || "Sin Folio";
                const auditor = item.usuario_nombre || "No Asignado";
                const area = item.area_usuario || "DGAJ";
                const ente = item.sujeto_fiscalizado || "No Definido";
                
                // Al no tener columna estatus explícita visible, usamos uno por defecto o "En Revisión" si tiene datos
                const estatusActual = item.comentarios_revision ? "En Revisión" : "Pendiente";
                const fechaCorta = item.created_at ? item.created_at.split('T')[0] : '2026-06-16';
                const turno = indice + 1;

                // Calcular estados gráficos para la Línea de Tiempo
                let paso1 = "completed", paso2 = "", paso3 = "";
                if (estatusActual === "En Revisión") { paso1 = "completed"; paso2 = "active"; }
                if (estatusActual === "Pendiente") { paso1 = "active"; }

                const tarjeta = document.createElement('div');
                tarjeta.className = "ticket-card";
                
                // Atributos meta para que sigan funcionando tus filtros de Supervisor
                tarjeta.setAttribute('data-auditor', auditor.toLowerCase());
                tarjeta.setAttribute('data-area', area);
                tarjeta.setAttribute('data-ente', ente.toLowerCase());
                tarjeta.setAttribute('data-estado', estatusActual);
                tarjeta.setAttribute('data-fecha', fechaCorta);

                tarjeta.innerHTML = `
                    <div class="ticket-header">
                        <span class="ticket-id">${folio}</span>
                        <span class="ticket-status status-${estatusActual.toLowerCase()}">${estatusActual}</span>
                    </div>
                    <div class="ticket-body-grid">
                        <div class="info-meta">
                            <p><strong>Tipo Solicitud:</strong> ${item.tipo_solicitud || 'Cédula de Hallazgo de Auditoría'}</p>
                            <p><strong>Auditor Responsable:</strong> ${auditor}</p>
                            <p><strong>Dirección / Área:</strong> <span style="color:var(--azul-info); font-weight:600;">${area}</span></p>
                            <p><strong>Sujeto Fiscalizado (Ente):</strong> <span style="color:var(--naranja-principal); font-weight:600;">${ente}</span></p>
                            <p style="color:#7F8C8D; font-size:0.85rem;"><strong>Fecha Registro:</strong> ${fechaCorta}</p>
                        </div>
                        <div class="timeline-container">
                            <div class="timeline-title">
                                <span>Línea de Fila Virtual</span>
                                <span style="color:var(--naranja-principal)">Turno en Fila: # ${turno}</span>
                            </div>
                            <div class="timeline">
                                <div class="timeline-step ${paso1}">
                                    <div class="timeline-node">1</div>
                                    <div class="timeline-label">Ingresado</div>
                                </div>
                                <div class="timeline-step ${paso2}">
                                    <div class="timeline-node">2</div>
                                    <div class="timeline-label">En Análisis</div>
                                </div>
                                <div class="timeline-step ${paso3}">
                                    <div class="timeline-node">3</div>
                                    <div class="timeline-label">Dictaminado</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="action-zone">
                        ${userRole === 'usuario' ? '<span style="font-size:0.85rem; color:#BDC3C7; font-style:italic; padding-top:5px;">🔒 Modo Consulta Autorizado (Solo Vista)</span>' : ''}
                        ${userRole === 'supervisor' ? `<button class="btn-action btn-prorrogas" onclick="solicitarAmpliacionTiempo('${folio}')">⏳ Solicitar Prórroga</button>` : ''}
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // MOTOR DE RENDERIZADO VISUAL - CONSTRUCCIÓN DE LA LÍNEA DE TIEMPO LOGICA
        function renderizarTicketsInterfaz(tickets) {
            const contenedor = document.getElementById('contenedor-tickets-maestro');
            contenedor.innerHTML = "";

            if (tickets.length === 0) {
                contenedor.innerHTML = "<p style='text-align:center; color:#95A5A6; padding:40px; background:white; border-radius:10px;'>No se encontraron tickets registrados o autorizados para este perfil.</p>";
                return;
            }

            tickets.forEach(item => {
                const estatusActual = item.estatus || "Pendiente";
                const ente = item.ente || "Municipio No Definido";
                const turno = item.posicion_fila || "A";
                const fechaCorta = item.fecha_creacion ? item.fecha_creacion.split('T')[0] : '2026-06-14';

                // Calcular estados gráficos para la Línea de Tiempo de la Fila Virtual
                let paso1 = "completed", paso2 = "", paso3 = "";
                if (estatusActual === "En Revisión") { paso1 = "completed"; paso2 = "active"; }
                if (estatusActual === "Completado") { paso1 = "completed"; paso2 = "completed"; paso3 = "active"; }
                if (estatusActual === "Pendiente") { paso1 = "active"; }

                const tarjeta = document.createElement('div');
                tarjeta.className = "ticket-card";
                
                // Atributos meta para filtrado instantáneo
                tarjeta.setAttribute('data-auditor', (item.nombre_solicitante || '').toLowerCase());
                tarjeta.setAttribute('data-area', item.area_solicitante || '');
                tarjeta.setAttribute('data-ente', ente.toLowerCase());
                tarjeta.setAttribute('data-estado', estatusActual);
                tarjeta.setAttribute('data-fecha', fechaCorta);

                tarjeta.innerHTML = `
                    <div class="ticket-header">
                        <span class="ticket-id">${item.folio_ticket || item.folio_user}</span>
                        <span class="ticket-status status-${estatusActual.toLowerCase().replace(/\s+/g, '')}">${estatusActual}</span>
                    </div>
                    <div class="ticket-body-grid">
                        <div class="info-meta">
                            <p><strong>Asunto Operativo:</strong> ${item.asunto || 'Revisión y desahogo de observaciones'}</p>
                            <p><strong>Auditor Responsable:</strong> ${item.nombre_solicitante || 'Asignado'}</p>
                            <p><strong>Dirección / Área:</strong> <span style="color:var(--azul-info); font-weight:600;">${item.area_solicitante || 'DGAJ'}</span></p>
                            <p><strong>Ente Fiscalizado:</strong> ${ente} | <strong>Prioridad:</strong> ${item.prioridad || 'Media'}</p>
                            <p style="color:#7F8C8D; font-size:0.85rem;"><strong>Fecha Registro:</strong> ${fechaCorta}</p>
                        </div>
                        <div class="timeline-container">
                            <div class="timeline-title">
                                <span>Línea de Fila Virtual</span>
                                <span style="color:var(--naranja-principal)">Turno Asignado: # ${turno}</span>
                            </div>
                            <div class="timeline">
                                <div class="timeline-step ${paso1}">
                                    <div class="timeline-node">1</div>
                                    <div class="timeline-label">Ingresado</div>
                                </div>
                                <div class="timeline-step ${paso2}">
                                    <div class="timeline-node">2</div>
                                    <div class="timeline-label">En Análisis</div>
                                </div>
                                <div class="timeline-step ${paso3}">
                                    <div class="timeline-node">3</div>
                                    <div class="timeline-label">Dictaminado</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="action-zone">
                        ${userRole === 'usuario' ? '<span style="font-size:0.85rem; color:#BDC3C7; font-style:italic; padding-top:5px;">🔒 Modo Consulta Autorizado (Solo Vista)</span>' : ''}
                        ${userRole === 'supervisor' ? `<button class="btn-action btn-prorrogas" onclick="solicitarAmpliacionTiempo('${item.folio_ticket || item.folio_user}')">⏳ Solicitar Prórroga</button>` : ''}
                        ${userRole === 'administrador' ? `
                            <button class="btn-action btn-edit" onclick="modificarEstadoAdministrador('${item.folio_ticket || item.folio_user}')">⚙️ Editar Estado</button>
                            <button class="btn-action btn-prorrogas" onclick="alert('Plazos extendidos directamente en base de datos de control.')">🔓 Forzar Término</button>
                        ` : ''}
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // ALGORITMO DE FILTRADO EN CLIENTE (SUPERVISOR / ADMIN)
        function ejecutarAlgoritmoFiltrado() {
            const valUser = document.getElementById('filtro-usuario').value.toLowerCase();
            const valArea = document.getElementById('filtro-area').value;
            const valEnte = document.getElementById('filtro-ente').value.toLowerCase();
            const valFecha = document.getElementById('filtro-fecha').value;
            const valEdo = document.getElementById('filtro-estatus').value;

            const tarjetas = document.querySelectorAll('.ticket-card');

            tarjetas.forEach(card => {
                const matchesUser = card.getAttribute('data-auditor').includes(valUser);
                const matchesArea = valArea === "" || card.getAttribute('data-area').includes(valArea);
                const matchesEnte = card.getAttribute('data-ente').includes(valEnte);
                const matchesFecha = valFecha === "" || card.getAttribute('data-fecha') === valFecha;
                const matchesEdo = valEdo === "" || card.getAttribute('data-estado') === valEdo;

                if (matchesUser && matchesArea && matchesEnte && matchesFecha && matchesEdo) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // ACCIÓN DEL SUPERVISOR: DISPARAR ALERTA DE PRÓRROGA AL ADMINISTRADOR
        function solicitarAmpliacionTiempo(folio) {
            const motivo = prompt(`Ingresa la justificación legal/técnica para solicitar prórroga de tiempo sobre el folio ${folio}:`);
            if (!motivo) return;

            // Simular el envío del payload de alerta al canal del Administrador
            let solicitudesPendientes = JSON.parse(localStorage.getItem('alertas_prorrogas_maestras')) || [];
            solicitudesPendientes.push({
                id: Date.now(),
                folio: folio,
                remitente: currentUserName,
                motivo: motivo
            });
            localStorage.setItem('alertas_prorrogas_maestras', JSON.stringify(solicitudesPendientes));

            alert(`Solicitud de tiempo extra enviada correctamente.\nSe ha generado un token de alerta en la consola del Administrador.`);
        }

        // ACCIÓN DEL ADMINISTRADOR: CAMBIAR ESTADOS DE LA FILA EN CALIENTE
        function modificarEstadoAdministrador(folio) {
            const opciones = ["Pendiente", "En Revisión", "Completado"];
            const nuevoEdo = prompt(`Modificación Operativa (${folio})\nEscribe el nuevo estado exactamente:\n- Pendiente\n- En Revisión\n- Completado`);
            
            if (!opciones.includes(nuevoEdo)) {
                if(nuevoEdo) alert("Estado inválido. Intenta de nuevo escribiéndolo exactamente.");
                return;
            }

            alert(`Estado de folio ${folio} actualizado exitosamente a: ${nuevoEdo}`);
            // Aquí se ejecutaría el método PATCH a Supabase; para entorno actual actualizamos la caché visual
            if(window.cacheFilaVirtual) {
                const target = window.cacheFilaVirtual.find(x => (x.folio_ticket === folio || x.folio_user === folio));
                if(target) target.estatus = nuevoEdo;
                renderizarTicketsInterfaz(window.cacheFilaVirtual);
            }
        }

        // CARGA DINÁMICA DE ALERTAS EN PANEL DE ADMINISTRADOR
        function recuperarSolicitudesProrrogaLocal() {
            const listaAlertas = document.getElementById('lista-alertas-prorrogas');
            const alertas = JSON.parse(localStorage.getItem('alertas_prorrogas_maestras')) || [
                { id: 101, folio: "JURIX-DGAJ-DCPL-B001-0009", remitente: "Supervisor Zona Norte", motivo: "Volumen excedente de folios y facturas por validar del sujeto fiscalizado." }
            ];

            listaAlertas.innerHTML = "";
            alertas.forEach(al => {
                const div = document.createElement('div');
                div.className = "alert-item";
                div.innerHTML = `
                    <div>
                        <strong>Folio Afectado: ${al.folio}</strong> — Solicitado por: <em>${al.remitente}</em><br>
                        <small style="color:#555;">Motivo técnico: "${al.motivo}"</small>
                    </div>
                    <div>
                        <button class="btn-action btn-success-panel" onclick="resolverProrrogaAdmin(${al.id}, true, this)">Autorizar</button>
                        <button class="btn-action btn-prorrogas" style="background:var(--rojo-alerta)" onclick="resolverProrrogaAdmin(${al.id}, false, this)">Rechazar</button>
                    </div>
                `;
                listaAlertas.appendChild(div);
            });
        }

        function resolverProrrogaAdmin(id, aprobado, boton) {
            alert(aprobado ? "Prórroga autorizada. Los tiempos del término se han modificado en el sistema." : "Solicitud denegada.");
            let alertas = JSON.parse(localStorage.getItem('alertas_prorrogas_maestras')) || [];
            alertas = alertas.filter(x => x.id !== id);
            localStorage.setItem('alertas_prorrogas_maestras', JSON.stringify(alertas));
            boton.closest('.alert-item').remove();
        }
    </script>
</body>
</html>
